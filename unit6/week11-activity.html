<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Week 11 Activity: Investment Portfolio Challenge</title>
    <link href="https://fonts.googleapis.com/css2?family=Wix+Madefor+Display:wght@700;800&family=Wix+Madefor+Text:wght@400;500;600&display=swap" rel="stylesheet">
    <style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0a0a14;color:#e2e8f0;font-family:'Wix Madefor Text',sans-serif;font-weight:400;line-height:1.7;font-size:16px}.header-bar{background:#0E1C42;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}.header-title{font-family:'Wix Madefor Display',sans-serif;font-weight:800;font-size:18px;color:#fff;letter-spacing:.5px}.header-sub{font-size:13px;color:#55C8E8;font-weight:500}.header-badge{background:linear-gradient(135deg,#F78F1E,#c46a0a);color:#fff;font-family:'Wix Madefor Display',sans-serif;font-weight:700;font-size:12px;padding:6px 16px;border-radius:20px;letter-spacing:.5px;text-transform:uppercase}.hero{background:linear-gradient(135deg,#0E1C42 0%,#1a1a3e 40%,#67308F 100%);padding:48px 24px;text-align:center}.hero h1{font-family:'Wix Madefor Display',sans-serif;font-weight:800;font-size:clamp(24px,4.5vw,36px);color:#fff;margin-bottom:8px}.hero p{color:#c8d6e8;font-size:17px;max-width:600px;margin:0 auto}.progress-container{max-width:800px;margin:0 auto;padding:24px 24px 0}.progress-bar-bg{background:#1a1a2e;border-radius:12px;height:14px;overflow:hidden}.progress-bar-fill{height:100%;border-radius:12px;background:linear-gradient(90deg,#55C8E8,#76C043);transition:width .5s ease}.progress-text{font-size:13px;color:#8899aa;margin-top:6px;text-align:right;font-weight:500}.content{max-width:800px;margin:0 auto;padding:24px}.phase-label{font-family:'Wix Madefor Display',sans-serif;font-weight:700;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#55C8E8;margin-bottom:16px}.scenario-box{background:#111122;border-radius:12px;padding:20px 24px;margin-bottom:24px;border:1px solid rgba(247,143,30,.2)}.scenario-label{font-family:'Wix Madefor Display',sans-serif;font-weight:700;font-size:12px;color:#F78F1E;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}.question-text{font-family:'Wix Madefor Display',sans-serif;font-weight:700;font-size:19px;color:#fff;margin-bottom:20px;line-height:1.4}.question-counter{font-size:13px;color:#8899aa;margin-bottom:8px;font-weight:500}.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}@media(max-width:600px){.options-grid{grid-template-columns:1fr}}.option-btn{background:#111122;border:2px solid #2a2a4a;border-radius:12px;padding:16px 18px;color:#c8d6e8;font-family:'Wix Madefor Text',sans-serif;font-size:15px;font-weight:500;cursor:pointer;text-align:left;transition:all .2s ease;line-height:1.5}.option-btn:hover{border-color:#55C8E8;background:#161630}.option-btn.correct{border-color:#76C043;background:rgba(118,192,67,.12);color:#fff}.option-btn.incorrect{border-color:#e74c5a;background:rgba(231,76,90,.1);color:#aaa}.option-btn.disabled{pointer-events:none}.feedback{border-radius:12px;padding:18px 22px;margin-top:16px;display:none;line-height:1.6}.feedback.correct{background:rgba(118,192,67,.1);border-left:4px solid #76C043}.feedback.incorrect{background:rgba(231,76,90,.08);border-left:4px solid #e74c5a}.feedback-title{font-family:'Wix Madefor Display',sans-serif;font-weight:700;font-size:15px;margin-bottom:6px}.feedback.correct .feedback-title{color:#76C043}.feedback.incorrect .feedback-title{color:#e74c5a}.feedback p{color:#c8d6e8;font-size:14px}.next-btn{display:none;margin-top:20px;background:linear-gradient(135deg,#55C8E8,#0E5568);color:#fff;border:none;border-radius:10px;padding:14px 32px;font-family:'Wix Madefor Display',sans-serif;font-weight:700;font-size:15px;cursor:pointer;letter-spacing:.5px;transition:transform .15s}.next-btn:hover{transform:scale(1.03)}.results-screen{display:none;text-align:center;padding:48px 24px}.score-circle{width:160px;height:160px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-family:'Wix Madefor Display',sans-serif;font-weight:800;font-size:42px;color:#fff}.score-label{font-size:15px;color:#8899aa;margin-bottom:8px}.score-msg{font-family:'Wix Madefor Display',sans-serif;font-weight:700;font-size:22px;color:#fff;margin-bottom:8px}.score-detail{color:#c8d6e8;max-width:500px;margin:0 auto 32px}.retry-btn{background:linear-gradient(135deg,#F78F1E,#c46a0a);color:#fff;border:none;border-radius:10px;padding:14px 36px;font-family:'Wix Madefor Display',sans-serif;font-weight:700;font-size:15px;cursor:pointer}.retry-btn:hover{transform:scale(1.03)}.hidden{display:none!important}</style>
</head>
<body>
    <div class="header-bar"><div><div class="header-title">Personal Finance &amp; Money Management Honors</div><div class="header-sub">Optima Academy Online</div></div><div class="header-badge">Activity · Week 11</div></div>
    <div class="hero"><h1>Investment Portfolio Challenge</h1><p>Compare investments, assess risk, and build a diversified portfolio.</p></div>
    <div class="progress-container"><div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div><div class="progress-text" id="progressText">Question 1 of 10</div></div>
    <div class="content" id="quizArea"><div id="phaseLabel" class="phase-label"></div><div id="scenarioBox" class="scenario-box hidden"><div class="scenario-label">📋 SCENARIO</div><div id="scenarioText"></div></div><div class="question-counter" id="questionCounter"></div><div class="question-text" id="questionText"></div><div class="options-grid" id="optionsGrid"></div><div class="feedback" id="feedbackBox"><div class="feedback-title" id="feedbackTitle"></div><p id="feedbackText"></p></div><button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next Question →</button></div>
    <div class="results-screen" id="resultsScreen"><div class="score-label">YOUR SCORE</div><div class="score-circle" id="scoreCircle"></div><div class="score-msg" id="scoreMsg"></div><div class="score-detail" id="scoreDetail"></div><button class="retry-btn" onclick="restartQuiz()">Try Again</button></div>
<script>
const questions=[
{phase:"PHASE 1: INVESTMENT TYPES",scenario:"Mia just turned 18 and received $3,000 from a college savings fund her grandparents started. She wants to invest it for long-term growth while she's in college.",question:"What is the key difference between saving and investing?",options:["There is no difference — they both grow your money the same way","Saving is low-risk with modest returns; investing has higher risk but higher potential growth","Investing is always safer because your money grows faster","Saving earns more money than investing over the long term"],correct:1,correctFeedback:"Saving protects your money with low returns (0.5–5%), while investing offers higher potential growth (7–10%+ average) but with the risk of losing money. Saving is for short-term needs; investing is for long-term goals.",incorrectFeedback:"Saving is low-risk with lower returns; investing carries more risk but has much higher growth potential over time. Savings accounts are FDIC insured; investments are not — your balance can go down."},
{phase:"",scenario:"",question:"Mia is considering buying stock in a single tech company. What does owning stock mean?",options:["She's lending money to the company","She owns a small piece of the company and shares in its profits or losses","She's guaranteed a fixed return each year","She can never lose her initial investment"],correct:1,correctFeedback:"Stock = ownership. When Mia buys shares, she owns a tiny piece of that company. If the company does well, her shares increase in value. If it does poorly, they decrease. There's no guarantee of returns.",incorrectFeedback:"Buying stock means buying ownership in a company — not lending money (that's bonds). You share in the company's success or failure, and there's no guarantee you'll get your money back."},
{phase:"",scenario:"",question:"How does a bond differ from a stock?",options:["Bonds give you ownership in a company; stocks are loans","Bonds are loans you make to an issuer who pays interest; stocks are ownership with no guaranteed return","Bonds always earn more than stocks","There is no practical difference"],correct:1,correctFeedback:"With bonds, you're the lender — the issuer (government or corporation) pays you interest and returns your principal at maturity. With stocks, you're an owner — returns depend on the company's performance. Bonds are generally lower risk/return than stocks.",incorrectFeedback:"Bonds = loans (you're the lender, they pay you interest). Stocks = ownership (you share profits/losses). Bonds are typically lower risk and lower return than stocks."},
{phase:"",scenario:"",question:"Why are index funds and ETFs popular with beginning investors?",options:["They guarantee profits every year","They provide instant diversification across hundreds of companies with low fees","They don't involve any risk at all","They always outperform individual stocks"],correct:1,correctFeedback:"A single index fund or ETF can give you ownership in hundreds or thousands of companies at once, providing instant diversification. They also typically have very low fees compared to actively managed mutual funds. They still carry market risk, though.",incorrectFeedback:"Index funds and ETFs are popular because one purchase gives you exposure to hundreds of companies (instant diversification) at very low fees. They still carry market risk but reduce the danger of any single company tanking your portfolio."},
{phase:"PHASE 2: RISK AND RETURN",scenario:"Carlos, a senior in Tampa, is researching investments. His uncle told him about a 'guaranteed' cryptocurrency investment promising 30% monthly returns.",question:"Carlos's uncle's crypto opportunity promises 30% monthly returns with 'no risk.' What is the most likely reality?",options:["It's a legitimate investment — crypto can earn high returns","It's almost certainly a scam — no legitimate investment guarantees high returns with no risk","It's risky but worth trying with a small amount","It's safe because his uncle recommended it"],correct:1,correctFeedback:"A fundamental rule of investing: higher returns always come with higher risk. Any investment 'guaranteeing' 30% monthly returns with no risk is almost certainly a scam or Ponzi scheme. Legitimate investments never guarantee specific returns.",incorrectFeedback:"This is a huge red flag. No legitimate investment guarantees returns, especially 30%/month. The risk-return principle says higher returns = higher risk, always. Promises of guaranteed high returns with no risk are hallmarks of fraud."},
{phase:"",scenario:"",question:"Which investment type generally has the LOWEST risk?",options:["Individual stocks in a startup company","U.S. government bonds","Cryptocurrency","An aggressive stock mutual fund"],correct:1,correctFeedback:"U.S. government bonds are among the lowest-risk investments available because they're backed by the full faith and credit of the U.S. government. The trade-off is lower returns (3–5%) compared to stocks.",incorrectFeedback:"U.S. government bonds are considered the safest common investment because they're backed by the federal government. Startups, crypto, and aggressive stock funds all carry significantly higher risk."},
{phase:"",scenario:"",question:"Why do financial experts say young investors (ages 16–25) can generally afford to take MORE investment risk?",options:["Young people don't need money","Young people have decades for investments to recover from market downturns","Young people always earn more money","Risk doesn't actually matter at any age"],correct:1,correctFeedback:"Time is the key. A 20-year-old has 40+ years before retirement. Even if the market drops 30% tomorrow, history shows it will recover and grow over time. Someone retiring in 5 years can't afford that same drop because they need the money soon.",incorrectFeedback:"Young investors can take more risk because they have a long time horizon. Market downturns are temporary — the S&P 500 has recovered from every crash in history. With decades ahead, young people can ride out volatility and benefit from long-term growth."},
{phase:"PHASE 3: DIVERSIFICATION & PORTFOLIO BUILDING",scenario:"Aaliyah has $5,000 to invest. She's considering two approaches: investing everything in one company she loves, or buying an S&P 500 index fund.",question:"Aaliyah puts all $5,000 in one company's stock. The company gets sued and the stock drops 50%. How much does she lose?",options:["$500","$2,500","$250","Nothing — stocks always recover quickly"],correct:1,correctFeedback:"50% of $5,000 = $2,500 lost. This is the danger of having all your money in a single stock. If Aaliyah had invested in an index fund of 500 companies, that one company's lawsuit would barely affect her portfolio.",incorrectFeedback:"A 50% drop on $5,000 = $2,500 lost. With zero diversification, one bad event wipes out half your investment. An index fund holding 500 companies would absorb that same event with minimal impact."},
{phase:"",scenario:"",question:"If Aaliyah instead invested the $5,000 in an S&P 500 index fund and that same company dropped 50%, approximately how much would her portfolio lose?",options:["About $2,500 — the same as owning the stock directly","Less than $50 — the company is only a tiny fraction of 500 companies","About $1,250 — exactly half the direct loss","The fund would gain money despite the drop"],correct:1,correctFeedback:"In an index of 500 companies, each company represents roughly 0.2% (some more, some less). A 50% drop in one company might reduce the overall fund by less than $10-50. That's diversification at work — spreading risk across hundreds of companies.",incorrectFeedback:"With 500 companies in the fund, one company dropping 50% barely moves the needle. The impact on Aaliyah's portfolio would likely be under $50 — compared to $2,500 if she owned only that stock. This is exactly why diversification matters."},
{phase:"",scenario:"",question:"Which portfolio is the MOST diversified?",options:["100% in one tech stock","50% tech stocks, 50% cash","40% U.S. stock index fund, 30% international stock fund, 20% bond fund, 10% cash","80% in three different cryptocurrency coins"],correct:2,correctFeedback:"This portfolio spreads investments across U.S. stocks, international stocks, bonds, and cash — different asset types and geographies. If U.S. stocks drop, international stocks or bonds may hold steady. Three crypto coins are all in one volatile asset class — that's concentration, not diversification.",incorrectFeedback:"True diversification means spreading across different asset types (stocks, bonds, cash) AND geographies (U.S., international). The portfolio with 40% U.S. stocks, 30% international, 20% bonds, and 10% cash is diversified across both dimensions."}
];

let currentQuestion=0,score=0,answered=false;
function renderQuestion(){const q=questions[currentQuestion];document.getElementById('progressFill').style.width=((currentQuestion)/questions.length*100)+'%';document.getElementById('progressText').textContent=`Question ${currentQuestion+1} of ${questions.length}`;const pl=document.getElementById('phaseLabel');if(q.phase){pl.textContent=q.phase;pl.classList.remove('hidden')}else{pl.classList.add('hidden')}const sb=document.getElementById('scenarioBox');if(q.scenario){document.getElementById('scenarioText').innerHTML=`<p style="color:#c8d6e8;margin:0;">${q.scenario}</p>`;sb.classList.remove('hidden')}else{sb.classList.add('hidden')}document.getElementById('questionCounter').textContent=`Question ${currentQuestion+1} of ${questions.length}`;document.getElementById('questionText').textContent=q.question;const grid=document.getElementById('optionsGrid');grid.innerHTML='';q.options.forEach((opt,i)=>{const btn=document.createElement('button');btn.className='option-btn';btn.textContent=opt;btn.onclick=()=>selectAnswer(i);grid.appendChild(btn)});document.getElementById('feedbackBox').style.display='none';document.getElementById('nextBtn').style.display='none';answered=false}
function selectAnswer(index){if(answered)return;answered=true;const q=questions[currentQuestion];const buttons=document.querySelectorAll('.option-btn');const isCorrect=index===q.correct;buttons.forEach((btn,i)=>{btn.classList.add('disabled');if(i===q.correct)btn.classList.add('correct');if(i===index&&!isCorrect)btn.classList.add('incorrect')});if(isCorrect)score++;const fb=document.getElementById('feedbackBox');fb.className='feedback '+(isCorrect?'correct':'incorrect');document.getElementById('feedbackTitle').textContent=isCorrect?'✅ Correct!':'❌ Not Quite';document.getElementById('feedbackText').textContent=isCorrect?q.correctFeedback:q.incorrectFeedback;fb.style.display='block';document.getElementById('nextBtn').style.display='inline-block';document.getElementById('nextBtn').textContent=currentQuestion<questions.length-1?'Next Question →':'See Results →'}
function nextQuestion(){currentQuestion++;if(currentQuestion>=questions.length){showResults()}else{renderQuestion();window.scrollTo({top:0,behavior:'smooth'})}}
function showResults(){document.getElementById('quizArea').style.display='none';document.querySelector('.progress-container').style.display='none';const pct=Math.round((score/questions.length)*100);let gradient,msg,detail;if(pct>=80){gradient='linear-gradient(135deg,#76C043,#4a8a20)';msg='Excellent Work!';detail=`You scored ${score}/${questions.length} (${pct}%). You understand investment types, risk vs. return, and the power of diversification. You're ready to think like an investor!`}else if(pct>=60){gradient='linear-gradient(135deg,#C7922C,#a07520)';msg='Good Effort!';detail=`You scored ${score}/${questions.length} (${pct}%). Solid foundation! Review diversification and the risk-return relationship to sharpen your investment knowledge.`}else{gradient='linear-gradient(135deg,#e74c5a,#b83040)';msg='Keep Practicing!';detail=`You scored ${score}/${questions.length} (${pct}%). Revisit the Week 11 reading on investment types, risk vs. return, and diversification, then try again.`}document.getElementById('resultsScreen').style.display='block';document.getElementById('scoreCircle').style.background=gradient;document.getElementById('scoreCircle').textContent=`${pct}%`;document.getElementById('scoreMsg').textContent=msg;document.getElementById('scoreDetail').textContent=detail;document.getElementById('progressFill').style.width='100%'}
function restartQuiz(){currentQuestion=0;score=0;document.getElementById('resultsScreen').style.display='none';document.getElementById('quizArea').style.display='block';document.querySelector('.progress-container').style.display='block';renderQuestion();window.scrollTo({top:0,behavior:'smooth'})}
renderQuestion();
</script>
</body>
</html>
