<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Week 12 Activity: Retirement Planning Challenge</title>
    <link href="https://fonts.googleapis.com/css2?family=Wix+Madefor+Display:wght@700;800&family=Wix+Madefor+Text:wght@400;500;600&display=swap" rel="stylesheet">
    <style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0a0a14;color:#e2e8f0;font-family:'Wix Madefor Text',sans-serif;font-weight:400;line-height:1.7;font-size:16px}.header-bar{background:#0E1C42;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}.header-title{font-family:'Wix Madefor Display',sans-serif;font-weight:800;font-size:18px;color:#fff;letter-spacing:.5px}.header-sub{font-size:13px;color:#55C8E8;font-weight:500}.header-badge{background:linear-gradient(135deg,#F78F1E,#c46a0a);color:#fff;font-family:'Wix Madefor Display',sans-serif;font-weight:700;font-size:12px;padding:6px 16px;border-radius:20px;letter-spacing:.5px;text-transform:uppercase}.hero{background:linear-gradient(135deg,#0E1C42 0%,#1a1a3e 40%,#67308F 100%);padding:48px 24px;text-align:center}.hero h1{font-family:'Wix Madefor Display',sans-serif;font-weight:800;font-size:clamp(24px,4.5vw,36px);color:#fff;margin-bottom:8px}.hero p{color:#c8d6e8;font-size:17px;max-width:600px;margin:0 auto}.progress-container{max-width:800px;margin:0 auto;padding:24px 24px 0}.progress-bar-bg{background:#1a1a2e;border-radius:12px;height:14px;overflow:hidden}.progress-bar-fill{height:100%;border-radius:12px;background:linear-gradient(90deg,#55C8E8,#76C043);transition:width .5s ease}.progress-text{font-size:13px;color:#8899aa;margin-top:6px;text-align:right;font-weight:500}.content{max-width:800px;margin:0 auto;padding:24px}.phase-label{font-family:'Wix Madefor Display',sans-serif;font-weight:700;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#55C8E8;margin-bottom:16px}.scenario-box{background:#111122;border-radius:12px;padding:20px 24px;margin-bottom:24px;border:1px solid rgba(247,143,30,.2)}.scenario-label{font-family:'Wix Madefor Display',sans-serif;font-weight:700;font-size:12px;color:#F78F1E;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}.question-text{font-family:'Wix Madefor Display',sans-serif;font-weight:700;font-size:19px;color:#fff;margin-bottom:20px;line-height:1.4}.question-counter{font-size:13px;color:#8899aa;margin-bottom:8px;font-weight:500}.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}@media(max-width:600px){.options-grid{grid-template-columns:1fr}}.option-btn{background:#111122;border:2px solid #2a2a4a;border-radius:12px;padding:16px 18px;color:#c8d6e8;font-family:'Wix Madefor Text',sans-serif;font-size:15px;font-weight:500;cursor:pointer;text-align:left;transition:all .2s ease;line-height:1.5}.option-btn:hover{border-color:#55C8E8;background:#161630}.option-btn.correct{border-color:#76C043;background:rgba(118,192,67,.12);color:#fff}.option-btn.incorrect{border-color:#e74c5a;background:rgba(231,76,90,.1);color:#aaa}.option-btn.disabled{pointer-events:none}.feedback{border-radius:12px;padding:18px 22px;margin-top:16px;display:none;line-height:1.6}.feedback.correct{background:rgba(118,192,67,.1);border-left:4px solid #76C043}.feedback.incorrect{background:rgba(231,76,90,.08);border-left:4px solid #e74c5a}.feedback-title{font-family:'Wix Madefor Display',sans-serif;font-weight:700;font-size:15px;margin-bottom:6px}.feedback.correct .feedback-title{color:#76C043}.feedback.incorrect .feedback-title{color:#e74c5a}.feedback p{color:#c8d6e8;font-size:14px}.next-btn{display:none;margin-top:20px;background:linear-gradient(135deg,#55C8E8,#0E5568);color:#fff;border:none;border-radius:10px;padding:14px 32px;font-family:'Wix Madefor Display',sans-serif;font-weight:700;font-size:15px;cursor:pointer;letter-spacing:.5px;transition:transform .15s}.next-btn:hover{transform:scale(1.03)}.results-screen{display:none;text-align:center;padding:48px 24px}.score-circle{width:160px;height:160px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-family:'Wix Madefor Display',sans-serif;font-weight:800;font-size:42px;color:#fff}.score-label{font-size:15px;color:#8899aa;margin-bottom:8px}.score-msg{font-family:'Wix Madefor Display',sans-serif;font-weight:700;font-size:22px;color:#fff;margin-bottom:8px}.score-detail{color:#c8d6e8;max-width:500px;margin:0 auto 32px}.retry-btn{background:linear-gradient(135deg,#F78F1E,#c46a0a);color:#fff;border:none;border-radius:10px;padding:14px 36px;font-family:'Wix Madefor Display',sans-serif;font-weight:700;font-size:15px;cursor:pointer}.retry-btn:hover{transform:scale(1.03)}.hidden{display:none!important}</style>
</head>
<body>
    <div class="header-bar"><div><div class="header-title">Personal Finance &amp; Money Management Honors</div><div class="header-sub">Optima Academy Online</div></div><div class="header-badge">Activity · Week 12</div></div>
    <div class="hero"><h1>Retirement Planning Challenge</h1><p>Compare retirement accounts, calculate compound growth, and see how matching multiplies savings.</p></div>
    <div class="progress-container"><div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div><div class="progress-text" id="progressText">Question 1 of 10</div></div>
    <div class="content" id="quizArea"><div id="phaseLabel" class="phase-label"></div><div id="scenarioBox" class="scenario-box hidden"><div class="scenario-label">📋 SCENARIO</div><div id="scenarioText"></div></div><div class="question-counter" id="questionCounter"></div><div class="question-text" id="questionText"></div><div class="options-grid" id="optionsGrid"></div><div class="feedback" id="feedbackBox"><div class="feedback-title" id="feedbackTitle"></div><p id="feedbackText"></p></div><button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next Question →</button></div>
    <div class="results-screen" id="resultsScreen"><div class="score-label">YOUR SCORE</div><div class="score-circle" id="scoreCircle"></div><div class="score-msg" id="scoreMsg"></div><div class="score-detail" id="scoreDetail"></div><button class="retry-btn" onclick="restartQuiz()">Try Again</button></div>
<script>
const questions=[
{phase:"PHASE 1: RETIREMENT ACCOUNT BASICS",scenario:"Tatiana, a senior in Pensacola, just got her first part-time job earning $10,000/year. She wants to start investing for retirement and is researching account types.",question:"What makes a Roth IRA especially powerful for a young person like Tatiana who's in a low tax bracket?",options:["She pays no taxes at all — ever","She pays low taxes on contributions now, and all future growth and withdrawals are completely tax-free","Roth IRAs guarantee a 10% return","She can withdraw all her money penalty-free at any time"],correct:1,correctFeedback:"Tatiana pays taxes on her contributions now (while she's in a low bracket), and then her investments grow tax-free for decades. In retirement, she withdraws everything tax-free. The less tax you pay going in, the better the deal.",incorrectFeedback:"A Roth IRA is funded with after-tax money (she pays taxes now while in a low bracket). The huge benefit: all growth and withdrawals in retirement are 100% tax-free. She pays a little now to save a lot later."},
{phase:"",scenario:"",question:"What is the main difference between a 401(k) and an IRA?",options:["A 401(k) is offered by your employer; an IRA is opened by you personally","A 401(k) earns more interest than an IRA","IRAs are only for people over 40","There is no difference — they're the same account"],correct:0,correctFeedback:"A 401(k) is employer-sponsored — your employer sets it up and may offer matching contributions. An IRA (Individual Retirement Account) is opened personally at a brokerage. Both offer tax advantages, but they have different contribution limits and rules.",incorrectFeedback:"The key difference: 401(k)s are employer-sponsored plans (set up through work, often with employer matching). IRAs are personal accounts you open yourself at a brokerage. Both have tax advantages but different rules and limits."},
{phase:"",scenario:"",question:"In a Traditional IRA, when do you pay taxes on your money?",options:["Never — Traditional IRAs are completely tax-free","When you contribute (going in)","When you withdraw in retirement (coming out)","Both when you contribute and when you withdraw"],correct:2,correctFeedback:"Traditional IRA = pay taxes later. Contributions may be tax-deductible now (saving you money today), but you pay income tax when you withdraw in retirement. This is the opposite of a Roth IRA, where you pay taxes now and withdraw tax-free.",incorrectFeedback:"Traditional IRAs are tax-deferred: you get a tax break now on contributions, but you pay income tax when you withdraw the money in retirement. Roth IRAs work the opposite way — pay taxes now, withdraw tax-free."},
{phase:"PHASE 2: EMPLOYER MATCH & COMPOUND GROWTH",scenario:"Marcus just started his first full-time job in Jacksonville, earning $45,000/year. His employer offers a 401(k) with a 100% match up to 4% of his salary.",question:"If Marcus contributes 4% of his salary to his 401(k), how much total money goes into his retirement account each year?",options:["$1,800 (just his contribution)","$3,600 (his 4% plus the employer's 4% match)","$4,500 (10% of his salary)","$900 (half of 4%)"],correct:1,correctFeedback:"Marcus contributes 4% × $45,000 = $1,800. His employer matches 100% of that = $1,800 more. Total: $3,600/year. The employer match is free money — Marcus would be leaving $1,800 on the table if he didn't contribute at least 4%.",incorrectFeedback:"4% of $45,000 = $1,800 from Marcus. With a 100% match, his employer adds another $1,800. Total: $3,600/year going into his 401(k). Not contributing at least 4% means giving up $1,800/year in free money."},
{phase:"",scenario:"",question:"If Marcus only contributes 2% instead of 4%, how much employer match money does he lose each year?",options:["$0 — the employer still matches the full 4%","$450","$900","$1,800"],correct:2,correctFeedback:"At 2%, Marcus contributes $900 and gets $900 in match. At 4%, he'd contribute $1,800 and get $1,800 in match. By contributing 2% instead of 4%, he loses $900/year in free employer money. Over 30 years at 8%, that's ~$100,000+ in lost wealth.",incorrectFeedback:"Employer matches your contribution dollar-for-dollar UP TO 4%. At 2%, Marcus gets $900 match. At 4%, he'd get $1,800 match. The difference: $900/year in free money left on the table."},
{phase:"",scenario:"Investor A starts investing $200/month at age 22 and stops at age 32 (10 years). Investor B starts investing $200/month at age 32 and continues until age 62 (30 years). Both earn 8% average return.",question:"Who ends up with MORE money at age 62?",options:["Investor B — she invested for 30 years vs. only 10","Investor A — her earlier start gives compound growth more time, despite contributing for fewer years","They end up with the same amount","It's impossible to determine without more information"],correct:1,correctFeedback:"Investor A contributes $24,000 over 10 years but lets it compound for 40 total years → ~$427,000. Investor B contributes $72,000 over 30 years → ~$300,000. Despite investing 3x more money, Investor B ends up with LESS because Investor A's early start gave compound growth decades more runway.",incorrectFeedback:"Investor A ($24,000 contributed, 40 years of growth) ends up with ~$427,000. Investor B ($72,000 contributed, 30 years of growth) ends up with ~$300,000. Starting earlier matters more than contributing more — compound growth needs time."},
{phase:"",scenario:"",question:"What is the early withdrawal penalty for most retirement accounts (401k, Traditional IRA) if you take money out before age 59½?",options:["No penalty — it's your money","5% penalty","10% penalty plus applicable income taxes","25% penalty"],correct:2,correctFeedback:"Withdrawing from a 401(k) or Traditional IRA before 59½ triggers a 10% penalty PLUS income taxes on the withdrawal. On a $10,000 withdrawal, you might lose $2,200–$3,400 to penalties and taxes. This is why retirement money should stay invested.",incorrectFeedback:"Early withdrawal from retirement accounts (before age 59½) incurs a 10% penalty plus income taxes. A $10,000 early withdrawal could cost $2,200–$3,400 in penalties and taxes. Retirement accounts are designed to stay invested long-term."},
{phase:"PHASE 3: BUILDING YOUR STRATEGY",scenario:"Kiara is 18, works part-time earning $6,000/year, and wants to start investing for retirement. She can save $100/month.",question:"What should be Kiara's FIRST retirement investing step?",options:["Open a 401(k) at her local bank","Buy individual stocks in companies she likes","Open a Roth IRA and invest in a low-cost index fund","Wait until she has a full-time job to start investing"],correct:2,correctFeedback:"A Roth IRA with a low-cost index fund is the ideal first step. Kiara is in a very low tax bracket, so she pays minimal taxes now and gets tax-free growth forever. An index fund provides instant diversification. She doesn't need a full-time job — she just needs earned income.",incorrectFeedback:"A Roth IRA is the best first step for a young person with earned income. Low tax bracket now = minimal taxes on contributions, then decades of tax-free growth. A low-cost index fund provides diversification. 401(k)s are only available through employers."},
{phase:"",scenario:"",question:"If Kiara invests $100/month starting at 18 with an average 8% return, approximately how much will she have at age 65?",options:["About $56,400 (just her contributions)","About $150,000","About $550,000","About $1,000,000"],correct:2,correctFeedback:"$100/month × 12 months × 47 years = $56,400 in total contributions. But at 8% compound growth, that grows to approximately $550,000 by age 65. Nearly $500,000 of that is pure investment growth — that's the power of starting at 18!",incorrectFeedback:"$100/month for 47 years = $56,400 in contributions. At 8% compound growth, this grows to approximately $550,000. About 90% of the final balance comes from investment growth, not contributions. Time is the multiplier."},
{phase:"",scenario:"",question:"What is the correct order for a smart retirement savings strategy?",options:["Max out Roth IRA → Build emergency fund → Get 401(k) match","Build emergency fund → Get full employer 401(k) match → Max out Roth IRA → Increase 401(k) beyond match","Invest everything in one stock → Save for emergencies later","Pay off all debt first, then start saving at age 40"],correct:1,correctFeedback:"The optimal order: (1) Emergency fund first (so you don't raid retirement accounts). (2) Get the full employer match (free money). (3) Max out Roth IRA (tax-free growth). (4) Increase 401(k) contributions beyond the match. This sequence maximizes both safety and growth.",incorrectFeedback:"The smart sequence: Emergency fund → Full employer match (free money) → Max Roth IRA (tax-free growth) → Increase 401(k). Emergency fund comes first so you never need to withdraw from retirement accounts and pay penalties."}
];

let currentQuestion=0,score=0,answered=false;
function renderQuestion(){const q=questions[currentQuestion];document.getElementById('progressFill').style.width=((currentQuestion)/questions.length*100)+'%';document.getElementById('progressText').textContent=`Question ${currentQuestion+1} of ${questions.length}`;const pl=document.getElementById('phaseLabel');if(q.phase){pl.textContent=q.phase;pl.classList.remove('hidden')}else{pl.classList.add('hidden')}const sb=document.getElementById('scenarioBox');if(q.scenario){document.getElementById('scenarioText').innerHTML=`<p style="color:#c8d6e8;margin:0;">${q.scenario}</p>`;sb.classList.remove('hidden')}else{sb.classList.add('hidden')}document.getElementById('questionCounter').textContent=`Question ${currentQuestion+1} of ${questions.length}`;document.getElementById('questionText').textContent=q.question;const grid=document.getElementById('optionsGrid');grid.innerHTML='';q.options.forEach((opt,i)=>{const btn=document.createElement('button');btn.className='option-btn';btn.textContent=opt;btn.onclick=()=>selectAnswer(i);grid.appendChild(btn)});document.getElementById('feedbackBox').style.display='none';document.getElementById('nextBtn').style.display='none';answered=false}
function selectAnswer(index){if(answered)return;answered=true;const q=questions[currentQuestion];const buttons=document.querySelectorAll('.option-btn');const isCorrect=index===q.correct;buttons.forEach((btn,i)=>{btn.classList.add('disabled');if(i===q.correct)btn.classList.add('correct');if(i===index&&!isCorrect)btn.classList.add('incorrect')});if(isCorrect)score++;const fb=document.getElementById('feedbackBox');fb.className='feedback '+(isCorrect?'correct':'incorrect');document.getElementById('feedbackTitle').textContent=isCorrect?'✅ Correct!':'❌ Not Quite';document.getElementById('feedbackText').textContent=isCorrect?q.correctFeedback:q.incorrectFeedback;fb.style.display='block';document.getElementById('nextBtn').style.display='inline-block';document.getElementById('nextBtn').textContent=currentQuestion<questions.length-1?'Next Question →':'See Results →'}
function nextQuestion(){currentQuestion++;if(currentQuestion>=questions.length){showResults()}else{renderQuestion();window.scrollTo({top:0,behavior:'smooth'})}}
function showResults(){document.getElementById('quizArea').style.display='none';document.querySelector('.progress-container').style.display='none';const pct=Math.round((score/questions.length)*100);let gradient,msg,detail;if(pct>=80){gradient='linear-gradient(135deg,#76C043,#4a8a20)';msg='Excellent Work!';detail=`You scored ${score}/${questions.length} (${pct}%). You understand retirement accounts, employer matching, and compound growth. Your future self is already grateful!`}else if(pct>=60){gradient='linear-gradient(135deg,#C7922C,#a07520)';msg='Good Effort!';detail=`You scored ${score}/${questions.length} (${pct}%). Strong foundation! Review the retirement account types and employer match calculations to level up.`}else{gradient='linear-gradient(135deg,#e74c5a,#b83040)';msg='Keep Practicing!';detail=`You scored ${score}/${questions.length} (${pct}%). Revisit the Week 12 reading on retirement accounts and compound growth, then try again.`}document.getElementById('resultsScreen').style.display='block';document.getElementById('scoreCircle').style.background=gradient;document.getElementById('scoreCircle').textContent=`${pct}%`;document.getElementById('scoreMsg').textContent=msg;document.getElementById('scoreDetail').textContent=detail;document.getElementById('progressFill').style.width='100%'}
function restartQuiz(){currentQuestion=0;score=0;document.getElementById('resultsScreen').style.display='none';document.getElementById('quizArea').style.display='block';document.querySelector('.progress-container').style.display='block';renderQuestion();window.scrollTo({top:0,behavior:'smooth'})}
renderQuestion();
</script>
</body>
</html>
