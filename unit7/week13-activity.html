<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Week 13 Activity: Insurance Advisor Challenge</title>
    <link href="https://fonts.googleapis.com/css2?family=Wix+Madefor+Display:wght@700;800&family=Wix+Madefor+Text:wght@400;500;600&display=swap" rel="stylesheet">
    <style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0a0a14;color:#e2e8f0;font-family:'Wix Madefor Text',sans-serif;font-weight:400;line-height:1.7;font-size:16px}.header-bar{background:#0E1C42;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}.header-title{font-family:'Wix Madefor Display',sans-serif;font-weight:800;font-size:18px;color:#fff}.header-sub{font-size:13px;color:#55C8E8;font-weight:500}.header-badge{background:linear-gradient(135deg,#F78F1E,#c46a0a);color:#fff;font-family:'Wix Madefor Display',sans-serif;font-weight:700;font-size:12px;padding:6px 16px;border-radius:20px;text-transform:uppercase}.hero{background:linear-gradient(135deg,#0E1C42 0%,#1a1a3e 40%,#67308F 100%);padding:48px 24px;text-align:center}.hero h1{font-family:'Wix Madefor Display',sans-serif;font-weight:800;font-size:clamp(24px,4.5vw,36px);color:#fff;margin-bottom:8px}.hero p{color:#c8d6e8;font-size:17px;max-width:600px;margin:0 auto}.progress-container{max-width:800px;margin:0 auto;padding:24px 24px 0}.progress-bar-bg{background:#1a1a2e;border-radius:12px;height:14px;overflow:hidden}.progress-bar-fill{height:100%;border-radius:12px;background:linear-gradient(90deg,#55C8E8,#76C043);transition:width .5s ease}.progress-text{font-size:13px;color:#8899aa;margin-top:6px;text-align:right;font-weight:500}.content{max-width:800px;margin:0 auto;padding:24px}.phase-label{font-family:'Wix Madefor Display',sans-serif;font-weight:700;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#55C8E8;margin-bottom:16px}.scenario-box{background:#111122;border-radius:12px;padding:20px 24px;margin-bottom:24px;border:1px solid rgba(247,143,30,.2)}.scenario-label{font-family:'Wix Madefor Display',sans-serif;font-weight:700;font-size:12px;color:#F78F1E;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}.question-text{font-family:'Wix Madefor Display',sans-serif;font-weight:700;font-size:19px;color:#fff;margin-bottom:20px;line-height:1.4}.question-counter{font-size:13px;color:#8899aa;margin-bottom:8px;font-weight:500}.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}@media(max-width:600px){.options-grid{grid-template-columns:1fr}}.option-btn{background:#111122;border:2px solid #2a2a4a;border-radius:12px;padding:16px 18px;color:#c8d6e8;font-family:'Wix Madefor Text',sans-serif;font-size:15px;font-weight:500;cursor:pointer;text-align:left;transition:all .2s ease;line-height:1.5}.option-btn:hover{border-color:#55C8E8;background:#161630}.option-btn.correct{border-color:#76C043;background:rgba(118,192,67,.12);color:#fff}.option-btn.incorrect{border-color:#e74c5a;background:rgba(231,76,90,.1);color:#aaa}.option-btn.disabled{pointer-events:none}.feedback{border-radius:12px;padding:18px 22px;margin-top:16px;display:none;line-height:1.6}.feedback.correct{background:rgba(118,192,67,.1);border-left:4px solid #76C043}.feedback.incorrect{background:rgba(231,76,90,.08);border-left:4px solid #e74c5a}.feedback-title{font-family:'Wix Madefor Display',sans-serif;font-weight:700;font-size:15px;margin-bottom:6px}.feedback.correct .feedback-title{color:#76C043}.feedback.incorrect .feedback-title{color:#e74c5a}.feedback p{color:#c8d6e8;font-size:14px}.next-btn{display:none;margin-top:20px;background:linear-gradient(135deg,#55C8E8,#0E5568);color:#fff;border:none;border-radius:10px;padding:14px 32px;font-family:'Wix Madefor Display',sans-serif;font-weight:700;font-size:15px;cursor:pointer;transition:transform .15s}.next-btn:hover{transform:scale(1.03)}.results-screen{display:none;text-align:center;padding:48px 24px}.score-circle{width:160px;height:160px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-family:'Wix Madefor Display',sans-serif;font-weight:800;font-size:42px;color:#fff}.score-label{font-size:15px;color:#8899aa;margin-bottom:8px}.score-msg{font-family:'Wix Madefor Display',sans-serif;font-weight:700;font-size:22px;color:#fff;margin-bottom:8px}.score-detail{color:#c8d6e8;max-width:500px;margin:0 auto 32px}.retry-btn{background:linear-gradient(135deg,#F78F1E,#c46a0a);color:#fff;border:none;border-radius:10px;padding:14px 36px;font-family:'Wix Madefor Display',sans-serif;font-weight:700;font-size:15px;cursor:pointer}.hidden{display:none!important}</style>
</head>
<body>
    <div class="header-bar"><div><div class="header-title">Personal Finance &amp; Money Management Honors</div><div class="header-sub">Optima Academy Online</div></div><div class="header-badge">Activity · Week 13</div></div>
    <div class="hero"><h1>Insurance Advisor Challenge</h1><p>Compare policies, calculate costs, and advise clients on the right coverage.</p></div>
    <div class="progress-container"><div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div><div class="progress-text" id="progressText">Question 1 of 10</div></div>
    <div class="content" id="quizArea"><div id="phaseLabel" class="phase-label"></div><div id="scenarioBox" class="scenario-box hidden"><div class="scenario-label">📋 SCENARIO</div><div id="scenarioText"></div></div><div class="question-counter" id="questionCounter"></div><div class="question-text" id="questionText"></div><div class="options-grid" id="optionsGrid"></div><div class="feedback" id="feedbackBox"><div class="feedback-title" id="feedbackTitle"></div><p id="feedbackText"></p></div><button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next Question →</button></div>
    <div class="results-screen" id="resultsScreen"><div class="score-label">YOUR SCORE</div><div class="score-circle" id="scoreCircle"></div><div class="score-msg" id="scoreMsg"></div><div class="score-detail" id="scoreDetail"></div><button class="retry-btn" onclick="restartQuiz()">Try Again</button></div>
<script>
const questions=[
{phase:"PHASE 1: INSURANCE FUNDAMENTALS",scenario:"Daniela just turned 18 and is about to start driving in Orlando. Her parents are helping her understand auto insurance before she gets her own policy.",question:"What is the purpose of a deductible in an insurance policy?",options:["It's the total amount your insurance company pays for a claim","It's the amount YOU pay out of pocket before insurance starts covering the rest","It's a monthly fee charged by the insurance company","It's a penalty for filing too many claims"],correct:1,correctFeedback:"The deductible is what you pay first when filing a claim. If your deductible is $500 and the damage is $2,000, you pay $500 and insurance covers the remaining $1,500. Higher deductibles mean lower monthly premiums.",incorrectFeedback:"A deductible is your out-of-pocket cost before insurance kicks in. On a $2,000 claim with a $500 deductible, you pay $500 and insurance pays $1,500."},
{phase:"",scenario:"Daniela is comparing two auto insurance plans.",question:"Plan A: $150/month premium, $500 deductible. Plan B: $100/month premium, $1,500 deductible. If Daniela has NO accidents this year, which plan costs less total?",options:["Plan A — lower deductible is always cheaper","Plan B — $100/month × 12 = $1,200 vs. Plan A's $1,800","They cost the same","It depends on her credit score"],correct:1,correctFeedback:"With no accidents, Daniela never uses her deductible. She only pays premiums. Plan B: $100 × 12 = $1,200/year. Plan A: $150 × 12 = $1,800/year. Plan B saves $600 — but she's taking the risk of paying $1,500 if an accident does happen.",incorrectFeedback:"With no claims, only premiums matter. Plan B: $100 × 12 = $1,200. Plan A: $150 × 12 = $1,800. Plan B saves $600 in a claim-free year. But if she does have an accident, Plan B's $1,500 deductible costs $1,000 more than Plan A's $500."},
{phase:"",scenario:"",question:"Daniela is in an accident that causes $4,000 in damage to her car. Her policy has a $500 deductible. How much does her insurance company pay?",options:["$4,000 — insurance covers everything","$3,500 — total damage minus her deductible","$500 — the insurance only pays the deductible amount","$2,000 — they split costs 50/50"],correct:1,correctFeedback:"Daniela pays her $500 deductible, and insurance covers the remaining $3,500. The deductible is YOUR share; insurance handles the rest up to your policy limits. Without insurance, she'd owe the full $4,000.",incorrectFeedback:"Insurance pays total damage minus the deductible: $4,000 − $500 = $3,500. Daniela pays the first $500 (her deductible), and the insurer covers everything above that."},
{phase:"",scenario:"",question:"Which type of auto insurance coverage would pay for damage to Daniela's car from a hurricane?",options:["Liability coverage","Collision coverage","Comprehensive coverage","Personal Injury Protection (PIP)"],correct:2,correctFeedback:"Comprehensive coverage handles non-collision events: hurricanes, flooding, theft, vandalism, falling objects, and animal strikes. Collision covers accidents with other vehicles or objects. In hurricane-prone Florida, comprehensive coverage is especially important.",incorrectFeedback:"Comprehensive coverage protects against non-collision events like hurricanes, flooding, theft, and vandalism. Collision covers crashes. Liability covers damage to others. PIP covers your medical costs. Hurricane damage = comprehensive."},
{phase:"PHASE 2: MATCHING COVERAGE TO NEEDS",scenario:"Marcus, 22, is moving into his first apartment in Jacksonville. He's working full-time and needs to figure out his insurance needs.",question:"Marcus's landlord says the building is insured. Does Marcus still need renters insurance?",options:["No — the landlord's insurance covers everything in the building","Yes — the landlord's policy covers the building structure, NOT Marcus's personal belongings","Only if Marcus owns expensive electronics","No — renters insurance is only for homeowners"],correct:1,correctFeedback:"The landlord's insurance covers the building itself, but NOT tenants' personal property. If a fire destroys Marcus's laptop, TV, clothes, and furniture, he'd lose everything without renters insurance. At $15–$30/month, it's one of the best values in insurance.",incorrectFeedback:"Landlord insurance covers the building structure only. Marcus's belongings (electronics, furniture, clothing) are NOT covered. Renters insurance protects his property from theft, fire, water damage, and more — typically for just $15–$30/month."},
{phase:"",scenario:"",question:"Marcus is still on his parents' health insurance plan. Until what age can he stay on their plan under federal law?",options:["Until age 18","Until age 21","Until age 26","There is no age limit"],correct:2,correctFeedback:"Under the Affordable Care Act, you can stay on a parent's health insurance plan until age 26, regardless of whether you're a student, married, or financially independent. This is one of the most valuable benefits for young adults.",incorrectFeedback:"Federal law (the Affordable Care Act) allows you to remain on a parent's health insurance plan until age 26. This applies regardless of student status, marital status, or whether you live with your parents."},
{phase:"",scenario:"",question:"Which type of insurance does Marcus NOT need right now as a single 22-year-old with no dependents?",options:["Auto insurance — he drives to work","Health insurance — he could get sick or injured","Renters insurance — he has belongings worth protecting","Life insurance — no one depends on his income"],correct:3,correctFeedback:"Life insurance is designed to replace income for people who depend on you (spouse, children). Since Marcus is single with no dependents, no one relies on his income to survive. He should prioritize health, auto, and renters insurance instead.",incorrectFeedback:"Life insurance replaces income for dependents. Marcus has no spouse or children relying on him financially, so life insurance isn't a priority yet. He needs auto (legally required), health (medical emergencies), and renters (protect belongings)."},
{phase:"PHASE 3: REAL-WORLD POLICY ANALYSIS",scenario:"Aaliyah, 20, is comparing two health insurance plans for her first job. Plan A: $180/month premium, $500 deductible, $25 copay, 80/20 coinsurance. Plan B: $120/month premium, $2,000 deductible, $40 copay, 70/30 coinsurance.",question:"If Aaliyah expects to visit the doctor frequently this year, which plan is likely the better value?",options:["Plan B — lower premium saves money every month","Plan A — lower deductible, lower copay, and better coinsurance mean she pays less when she uses healthcare","They cost exactly the same over a year","She should skip insurance and pay out of pocket"],correct:1,correctFeedback:"For someone who uses healthcare frequently, Plan A's lower deductible ($500 vs. $2,000), lower copays ($25 vs. $40), and better coinsurance (80/20 vs. 70/30) mean much lower costs when she actually uses the insurance — even though the premium is higher.",incorrectFeedback:"When you expect frequent healthcare use, lower deductible + lower copay + better coinsurance saves more than a lower premium. Plan A costs $60/month more in premiums but saves significantly on every doctor visit, procedure, and prescription."},
{phase:"",scenario:"",question:"Aaliyah goes to the hospital. The total bill is $10,000. She has Plan A ($500 deductible, 80/20 coinsurance). How much does she pay in total?",options:["$500 (just the deductible)","$2,400 ($500 deductible + 20% of the remaining $9,500)","$10,000 (insurance doesn't cover hospital stays)","$2,000 (20% of the total bill)"],correct:1,correctFeedback:"Step 1: Aaliyah pays her $500 deductible. Step 2: Remaining balance = $9,500. Step 3: She pays 20% coinsurance = $9,500 × 0.20 = $1,900. Total out of pocket: $500 + $1,900 = $2,400. Without insurance, she'd owe the full $10,000.",incorrectFeedback:"Calculate: Deductible = $500. Remaining = $10,000 − $500 = $9,500. Coinsurance (20%) = $9,500 × 0.20 = $1,900. Total: $500 + $1,900 = $2,400. Insurance saves Aaliyah $7,600 on this one bill."},
{phase:"",scenario:"",question:"Which of the following is the BEST overall reason to have insurance?",options:["It makes you money through interest","It prevents bad things from happening","It transfers the financial risk of catastrophic losses from you to the insurance company","It's only useful if you file a claim every year"],correct:2,correctFeedback:"Insurance doesn't prevent bad events — it protects you financially when they happen. By paying a predictable premium, you transfer the risk of a potentially devastating loss to the insurance company. One major uninsured event could wipe out years of savings.",incorrectFeedback:"Insurance is about risk transfer. You pay a manageable premium so that if something catastrophic happens (car accident, hospitalization, apartment fire), the financial impact doesn't destroy your savings and financial future."}
];
let currentQuestion=0,score=0,answered=false;
function renderQuestion(){const q=questions[currentQuestion];document.getElementById('progressFill').style.width=((currentQuestion)/questions.length*100)+'%';document.getElementById('progressText').textContent=`Question ${currentQuestion+1} of ${questions.length}`;const pl=document.getElementById('phaseLabel');if(q.phase){pl.textContent=q.phase;pl.classList.remove('hidden')}else{pl.classList.add('hidden')}const sb=document.getElementById('scenarioBox');if(q.scenario){document.getElementById('scenarioText').innerHTML=`<p style="color:#c8d6e8;margin:0;">${q.scenario}</p>`;sb.classList.remove('hidden')}else{sb.classList.add('hidden')}document.getElementById('questionCounter').textContent=`Question ${currentQuestion+1} of ${questions.length}`;document.getElementById('questionText').textContent=q.question;const grid=document.getElementById('optionsGrid');grid.innerHTML='';q.options.forEach((opt,i)=>{const btn=document.createElement('button');btn.className='option-btn';btn.textContent=opt;btn.onclick=()=>selectAnswer(i);grid.appendChild(btn)});document.getElementById('feedbackBox').style.display='none';document.getElementById('nextBtn').style.display='none';answered=false}
function selectAnswer(index){if(answered)return;answered=true;const q=questions[currentQuestion];const buttons=document.querySelectorAll('.option-btn');const isCorrect=index===q.correct;buttons.forEach((btn,i)=>{btn.classList.add('disabled');if(i===q.correct)btn.classList.add('correct');if(i===index&&!isCorrect)btn.classList.add('incorrect')});if(isCorrect)score++;const fb=document.getElementById('feedbackBox');fb.className='feedback '+(isCorrect?'correct':'incorrect');document.getElementById('feedbackTitle').textContent=isCorrect?'✅ Correct!':'❌ Not Quite';document.getElementById('feedbackText').textContent=isCorrect?q.correctFeedback:q.incorrectFeedback;fb.style.display='block';document.getElementById('nextBtn').style.display='inline-block';document.getElementById('nextBtn').textContent=currentQuestion<questions.length-1?'Next Question →':'See Results →'}
function nextQuestion(){currentQuestion++;if(currentQuestion>=questions.length){showResults()}else{renderQuestion();window.scrollTo({top:0,behavior:'smooth'})}}
function showResults(){document.getElementById('quizArea').style.display='none';document.querySelector('.progress-container').style.display='none';const pct=Math.round((score/questions.length)*100);let gradient,msg,detail;if(pct>=80){gradient='linear-gradient(135deg,#76C043,#4a8a20)';msg='Excellent Work!';detail=`You scored ${score}/${questions.length} (${pct}%). You can compare policies, calculate costs, and match coverage to real-world needs. You're insurance-literate!`}else if(pct>=60){gradient='linear-gradient(135deg,#C7922C,#a07520)';msg='Good Effort!';detail=`You scored ${score}/${questions.length} (${pct}%). Review the premium-deductible trade-off and coinsurance calculations to strengthen your skills.`}else{gradient='linear-gradient(135deg,#e74c5a,#b83040)';msg='Keep Practicing!';detail=`You scored ${score}/${questions.length} (${pct}%). Revisit the Week 13 reading on insurance types and key terms, then try again.`}document.getElementById('resultsScreen').style.display='block';document.getElementById('scoreCircle').style.background=gradient;document.getElementById('scoreCircle').textContent=`${pct}%`;document.getElementById('scoreMsg').textContent=msg;document.getElementById('scoreDetail').textContent=detail;document.getElementById('progressFill').style.width='100%'}
function restartQuiz(){currentQuestion=0;score=0;document.getElementById('resultsScreen').style.display='none';document.getElementById('quizArea').style.display='block';document.querySelector('.progress-container').style.display='block';renderQuestion();window.scrollTo({top:0,behavior:'smooth'})}
renderQuestion();
</script>
</body>
</html>
