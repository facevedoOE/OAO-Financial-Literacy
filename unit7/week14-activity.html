<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Week 14 Activity: Risk Management Challenge</title>
    <link href="https://fonts.googleapis.com/css2?family=Wix+Madefor+Display:wght@700;800&family=Wix+Madefor+Text:wght@400;500;600&display=swap" rel="stylesheet">
    <style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0a0a14;color:#e2e8f0;font-family:'Wix Madefor Text',sans-serif;font-weight:400;line-height:1.7;font-size:16px}.header-bar{background:#0E1C42;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}.header-title{font-family:'Wix Madefor Display',sans-serif;font-weight:800;font-size:18px;color:#fff}.header-sub{font-size:13px;color:#55C8E8;font-weight:500}.header-badge{background:linear-gradient(135deg,#F78F1E,#c46a0a);color:#fff;font-family:'Wix Madefor Display',sans-serif;font-weight:700;font-size:12px;padding:6px 16px;border-radius:20px;text-transform:uppercase}.hero{background:linear-gradient(135deg,#0E1C42 0%,#1a1a3e 40%,#67308F 100%);padding:48px 24px;text-align:center}.hero h1{font-family:'Wix Madefor Display',sans-serif;font-weight:800;font-size:clamp(24px,4.5vw,36px);color:#fff;margin-bottom:8px}.hero p{color:#c8d6e8;font-size:17px;max-width:600px;margin:0 auto}.progress-container{max-width:800px;margin:0 auto;padding:24px 24px 0}.progress-bar-bg{background:#1a1a2e;border-radius:12px;height:14px;overflow:hidden}.progress-bar-fill{height:100%;border-radius:12px;background:linear-gradient(90deg,#55C8E8,#76C043);transition:width .5s ease}.progress-text{font-size:13px;color:#8899aa;margin-top:6px;text-align:right;font-weight:500}.content{max-width:800px;margin:0 auto;padding:24px}.phase-label{font-family:'Wix Madefor Display',sans-serif;font-weight:700;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#55C8E8;margin-bottom:16px}.scenario-box{background:#111122;border-radius:12px;padding:20px 24px;margin-bottom:24px;border:1px solid rgba(247,143,30,.2)}.scenario-label{font-family:'Wix Madefor Display',sans-serif;font-weight:700;font-size:12px;color:#F78F1E;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}.question-text{font-family:'Wix Madefor Display',sans-serif;font-weight:700;font-size:19px;color:#fff;margin-bottom:20px;line-height:1.4}.question-counter{font-size:13px;color:#8899aa;margin-bottom:8px;font-weight:500}.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}@media(max-width:600px){.options-grid{grid-template-columns:1fr}}.option-btn{background:#111122;border:2px solid #2a2a4a;border-radius:12px;padding:16px 18px;color:#c8d6e8;font-family:'Wix Madefor Text',sans-serif;font-size:15px;font-weight:500;cursor:pointer;text-align:left;transition:all .2s ease;line-height:1.5}.option-btn:hover{border-color:#55C8E8;background:#161630}.option-btn.correct{border-color:#76C043;background:rgba(118,192,67,.12);color:#fff}.option-btn.incorrect{border-color:#e74c5a;background:rgba(231,76,90,.1);color:#aaa}.option-btn.disabled{pointer-events:none}.feedback{border-radius:12px;padding:18px 22px;margin-top:16px;display:none;line-height:1.6}.feedback.correct{background:rgba(118,192,67,.1);border-left:4px solid #76C043}.feedback.incorrect{background:rgba(231,76,90,.08);border-left:4px solid #e74c5a}.feedback-title{font-family:'Wix Madefor Display',sans-serif;font-weight:700;font-size:15px;margin-bottom:6px}.feedback.correct .feedback-title{color:#76C043}.feedback.incorrect .feedback-title{color:#e74c5a}.feedback p{color:#c8d6e8;font-size:14px}.next-btn{display:none;margin-top:20px;background:linear-gradient(135deg,#55C8E8,#0E5568);color:#fff;border:none;border-radius:10px;padding:14px 32px;font-family:'Wix Madefor Display',sans-serif;font-weight:700;font-size:15px;cursor:pointer;transition:transform .15s}.next-btn:hover{transform:scale(1.03)}.results-screen{display:none;text-align:center;padding:48px 24px}.score-circle{width:160px;height:160px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-family:'Wix Madefor Display',sans-serif;font-weight:800;font-size:42px;color:#fff}.score-label{font-size:15px;color:#8899aa;margin-bottom:8px}.score-msg{font-family:'Wix Madefor Display',sans-serif;font-weight:700;font-size:22px;color:#fff;margin-bottom:8px}.score-detail{color:#c8d6e8;max-width:500px;margin:0 auto 32px}.retry-btn{background:linear-gradient(135deg,#F78F1E,#c46a0a);color:#fff;border:none;border-radius:10px;padding:14px 36px;font-family:'Wix Madefor Display',sans-serif;font-weight:700;font-size:15px;cursor:pointer}.hidden{display:none!important}</style>
</head>
<body>
    <div class="header-bar"><div><div class="header-title">Personal Finance &amp; Money Management Honors</div><div class="header-sub">Optima Academy Online</div></div><div class="header-badge">Activity · Week 14</div></div>
    <div class="hero"><h1>Risk Management Challenge</h1><p>Identify fraud, evaluate policies, and build a comprehensive protection plan.</p></div>
    <div class="progress-container"><div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div><div class="progress-text" id="progressText">Question 1 of 10</div></div>
    <div class="content" id="quizArea"><div id="phaseLabel" class="phase-label"></div><div id="scenarioBox" class="scenario-box hidden"><div class="scenario-label">📋 SCENARIO</div><div id="scenarioText"></div></div><div class="question-counter" id="questionCounter"></div><div class="question-text" id="questionText"></div><div class="options-grid" id="optionsGrid"></div><div class="feedback" id="feedbackBox"><div class="feedback-title" id="feedbackTitle"></div><p id="feedbackText"></p></div><button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next Question →</button></div>
    <div class="results-screen" id="resultsScreen"><div class="score-label">YOUR SCORE</div><div class="score-circle" id="scoreCircle"></div><div class="score-msg" id="scoreMsg"></div><div class="score-detail" id="scoreDetail"></div><button class="retry-btn" onclick="restartQuiz()">Try Again</button></div>
<script>
const questions=[
{phase:"PHASE 1: IDENTITY THEFT & FRAUD",scenario:"Kenji, a college freshman in Gainesville, notices a $450 charge on his bank statement from an electronics store he's never visited. He also received an email saying a new credit card was opened in his name.",question:"What is the FIRST step Kenji should take?",options:["Ignore it — banks make mistakes sometimes","Contact his bank immediately to report the unauthorized charge and freeze his accounts","Post about it on social media to warn friends","Wait a week to see if more charges appear"],correct:1,correctFeedback:"Time is critical with identity theft. Kenji should immediately contact his bank to report the fraud and freeze his accounts. Then he should place a fraud alert with the credit bureaus and report to IdentityTheft.gov. Every hour of delay gives the thief more time.",incorrectFeedback:"Never ignore unauthorized charges — they usually indicate identity theft. Contact your bank immediately, freeze accounts, place a fraud alert with credit bureaus, and report to IdentityTheft.gov. Acting fast limits the damage."},
{phase:"",scenario:"",question:"What is a credit freeze, and how does it protect Kenji?",options:["It lowers the interest rates on all his credit cards","It blocks anyone (including Kenji) from opening new credit accounts until the freeze is lifted","It closes all of his existing bank accounts","It automatically refunds all fraudulent charges"],correct:1,correctFeedback:"A credit freeze locks your credit report so no one can open new accounts in your name — including you, until you temporarily lift it. This stops identity thieves from opening credit cards, loans, or other accounts using your stolen information. It's free to place and remove.",incorrectFeedback:"A credit freeze restricts access to your credit report, preventing anyone from opening new credit accounts in your name. It doesn't close existing accounts or affect interest rates. It's free, reversible, and one of the most effective identity theft protections."},
{phase:"",scenario:"",question:"Which of the following is the MOST effective way to prevent identity theft?",options:["Using the same password for all accounts so you don't forget","Enabling two-factor authentication (2FA) on all financial accounts","Sharing your SSN freely when any website asks for it","Only using cash for all purchases"],correct:1,correctFeedback:"Two-factor authentication adds a second layer of security beyond just a password. Even if someone steals your password, they can't access your account without the second factor (usually a code sent to your phone). This single step prevents the majority of account hacks.",incorrectFeedback:"Two-factor authentication (2FA) is the most effective single protection against identity theft. It requires both your password AND a second verification (phone code, fingerprint), making stolen passwords useless without the second factor."},
{phase:"",scenario:"",question:"Why are people ages 18–29 at higher risk for identity theft than older adults?",options:["They have more money in their accounts","They share more personal data online, use more apps, and rarely monitor their credit","Identity thieves only target young people","Banks don't protect accounts for people under 30"],correct:1,correctFeedback:"Young adults share personal data across many platforms, use numerous apps and services, and are less likely to regularly check credit reports or bank statements. This combination creates more opportunities for identity thieves to access personal information.",incorrectFeedback:"Young adults are targeted because they share more personal information online, use many digital services, and rarely monitor their credit reports or bank statements — giving thieves more data to steal and more time before detection."},
{phase:"PHASE 2: EMERGENCY FUNDS & RISK LAYERS",scenario:"Valentina, 22, just moved to Miami for her first job. She earns $2,800/month. Her essential expenses total $2,000/month. She has no emergency fund yet.",question:"How much should Valentina save as a starter emergency fund goal?",options:["$500 — just enough for one small emergency","$6,000–$12,000 (3–6 months of essential expenses)","$100 — anything helps","$50,000 — you can never be too safe"],correct:1,correctFeedback:"The standard recommendation is 3–6 months of essential expenses. At $2,000/month, that's $6,000–$12,000. This covers her if she loses her job, has a major car repair, or faces a medical emergency. She should start small and build toward this target.",incorrectFeedback:"Financial experts recommend 3–6 months of essential expenses. For Valentina, that's $2,000 × 3 to 6 = $6,000–$12,000. This provides a safety net for job loss, medical emergencies, or major unexpected costs."},
{phase:"",scenario:"Valentina's car needs $700 in repairs. The damage is below her $1,000 auto insurance deductible, so insurance won't cover it.",question:"What is the smartest way for Valentina to handle this expense?",options:["Put it on a credit card at 22% APR and pay the minimum each month","Skip the repair and hope the car keeps working","Pay from her emergency fund, then replenish it over the next few months","Take out a payday loan to cover it"],correct:2,correctFeedback:"This is exactly what an emergency fund is for — unexpected expenses that insurance doesn't cover. Valentina pays $700 from savings (no interest, no debt), gets her car fixed, and rebuilds her fund over the next few months. Credit cards and payday loans add costly interest to an already stressful situation.",incorrectFeedback:"Emergency funds exist for exactly this situation — unexpected costs below your insurance deductible. Paying from savings avoids credit card interest (which would add $100+) and payday loan traps (which could add $150+ in fees)."},
{phase:"",scenario:"",question:"Which 'layer' of risk management prevents losses from happening in the first place?",options:["Emergency fund — it absorbs financial shocks","Insurance — it covers catastrophic losses","Prevention — safe driving, strong passwords, healthy habits, home safety","All three layers prevent losses equally"],correct:2,correctFeedback:"Prevention is the proactive layer — it reduces the chance of bad events occurring. Safe driving habits prevent accidents. Strong passwords prevent identity theft. Healthy habits reduce medical expenses. Emergency funds and insurance react to losses; prevention stops them before they start.",incorrectFeedback:"Prevention is the layer that stops losses before they happen: safe driving, strong passwords, 2FA, healthy habits, and home safety reduce the likelihood of needing insurance or your emergency fund in the first place."},
{phase:"PHASE 3: EVALUATING INSURANCE POLICIES",scenario:"Aaliyah is comparing two renters insurance policies for her new apartment in Orlando. Policy A: $15/month, $500 deductible, covers theft from vehicles, $30,000 coverage limit. Policy B: $12/month, $1,000 deductible, excludes theft from vehicles, $20,000 coverage limit.",question:"Aaliyah's electronics and belongings are worth about $12,000. Her laptop ($1,500) often stays in her car. Which policy is the better choice?",options:["Policy B — it's cheaper every month","Policy A — it covers theft from vehicles, has a lower deductible, and higher coverage limits for only $3 more per month","They're basically the same","She doesn't need renters insurance at all"],correct:1,correctFeedback:"Policy A costs $36/year more ($3/month × 12) but provides critical coverage Policy B lacks: theft from vehicles (protecting her $1,500 laptop), a $500 lower deductible, and $10,000 more in coverage. The $36 annual difference could prevent a $1,500+ loss.",incorrectFeedback:"For $3/month more, Policy A covers theft from vehicles (protecting Aaliyah's $1,500 laptop left in her car), has a lower deductible ($500 vs. $1,000), and offers $10,000 more coverage. The cheapest policy isn't always the best — read the exclusions."},
{phase:"",scenario:"",question:"What is a policy 'exclusion,' and why should you always read them before purchasing?",options:["An exclusion is a discount for being a good customer","An exclusion is a specific situation NOT covered by your policy — unread exclusions can leave you unprotected when you need coverage most","An exclusion adds extra coverage to your policy","Exclusions only apply to life insurance"],correct:1,correctFeedback:"Exclusions are situations your policy specifically does NOT cover. For example, many Florida renters policies exclude flood damage. If Aaliyah didn't read exclusions and her apartment flooded, she'd discover too late that she has no coverage. Always read exclusions before you buy.",incorrectFeedback:"An exclusion is something your insurance specifically won't cover. Common examples: flood damage in renters/homeowners policies, theft from vehicles, cosmetic damage. Not reading exclusions means discovering you're unprotected when you need help most."},
{phase:"",scenario:"",question:"Which statement BEST describes the overall purpose of risk management?",options:["Risk management eliminates all financial risk from your life","Risk management uses insurance, savings, and prevention to reduce the financial impact of unexpected events","Risk management is only important for wealthy people","Risk management means avoiding all risky activities"],correct:1,correctFeedback:"Risk management doesn't eliminate risk — it reduces its financial impact through three layers: prevention (reducing the chance of loss), insurance (transferring catastrophic risk), and emergency savings (absorbing smaller unexpected costs). Together, they create a comprehensive safety net.",incorrectFeedback:"Risk management combines prevention, insurance, and emergency savings to reduce the financial impact of unexpected events. It doesn't eliminate risk entirely — it makes financial surprises manageable instead of devastating."}
];
let currentQuestion=0,score=0,answered=false;
function renderQuestion(){const q=questions[currentQuestion];document.getElementById('progressFill').style.width=((currentQuestion)/questions.length*100)+'%';document.getElementById('progressText').textContent=`Question ${currentQuestion+1} of ${questions.length}`;const pl=document.getElementById('phaseLabel');if(q.phase){pl.textContent=q.phase;pl.classList.remove('hidden')}else{pl.classList.add('hidden')}const sb=document.getElementById('scenarioBox');if(q.scenario){document.getElementById('scenarioText').innerHTML=`<p style="color:#c8d6e8;margin:0;">${q.scenario}</p>`;sb.classList.remove('hidden')}else{sb.classList.add('hidden')}document.getElementById('questionCounter').textContent=`Question ${currentQuestion+1} of ${questions.length}`;document.getElementById('questionText').textContent=q.question;const grid=document.getElementById('optionsGrid');grid.innerHTML='';q.options.forEach((opt,i)=>{const btn=document.createElement('button');btn.className='option-btn';btn.textContent=opt;btn.onclick=()=>selectAnswer(i);grid.appendChild(btn)});document.getElementById('feedbackBox').style.display='none';document.getElementById('nextBtn').style.display='none';answered=false}
function selectAnswer(index){if(answered)return;answered=true;const q=questions[currentQuestion];const buttons=document.querySelectorAll('.option-btn');const isCorrect=index===q.correct;buttons.forEach((btn,i)=>{btn.classList.add('disabled');if(i===q.correct)btn.classList.add('correct');if(i===index&&!isCorrect)btn.classList.add('incorrect')});if(isCorrect)score++;const fb=document.getElementById('feedbackBox');fb.className='feedback '+(isCorrect?'correct':'incorrect');document.getElementById('feedbackTitle').textContent=isCorrect?'✅ Correct!':'❌ Not Quite';document.getElementById('feedbackText').textContent=isCorrect?q.correctFeedback:q.incorrectFeedback;fb.style.display='block';document.getElementById('nextBtn').style.display='inline-block';document.getElementById('nextBtn').textContent=currentQuestion<questions.length-1?'Next Question →':'See Results →'}
function nextQuestion(){currentQuestion++;if(currentQuestion>=questions.length){showResults()}else{renderQuestion();window.scrollTo({top:0,behavior:'smooth'})}}
function showResults(){document.getElementById('quizArea').style.display='none';document.querySelector('.progress-container').style.display='none';const pct=Math.round((score/questions.length)*100);let gradient,msg,detail;if(pct>=80){gradient='linear-gradient(135deg,#76C043,#4a8a20)';msg='Excellent Work!';detail=`You scored ${score}/${questions.length} (${pct}%). You can identify fraud, evaluate insurance policies, and build a complete risk management strategy. Well done!`}else if(pct>=60){gradient='linear-gradient(135deg,#C7922C,#a07520)';msg='Good Effort!';detail=`You scored ${score}/${questions.length} (${pct}%). Review identity theft prevention and policy evaluation to strengthen your risk management skills.`}else{gradient='linear-gradient(135deg,#e74c5a,#b83040)';msg='Keep Practicing!';detail=`You scored ${score}/${questions.length} (${pct}%). Revisit the Week 14 reading on identity theft, emergency funds, and policy evaluation, then try again.`}document.getElementById('resultsScreen').style.display='block';document.getElementById('scoreCircle').style.background=gradient;document.getElementById('scoreCircle').textContent=`${pct}%`;document.getElementById('scoreMsg').textContent=msg;document.getElementById('scoreDetail').textContent=detail;document.getElementById('progressFill').style.width='100%'}
function restartQuiz(){currentQuestion=0;score=0;document.getElementById('resultsScreen').style.display='none';document.getElementById('quizArea').style.display='block';document.querySelector('.progress-container').style.display='block';renderQuestion();window.scrollTo({top:0,behavior:'smooth'})}
renderQuestion();
</script>
</body>
</html>
