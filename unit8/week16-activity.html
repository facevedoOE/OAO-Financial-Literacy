<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Week 16 Activity: Final Review Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Wix+Madefor+Display:wght@700;800&family=Wix+Madefor+Text:wght@400;500;600&display=swap" rel="stylesheet">
    <style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0a0a14;color:#e2e8f0;font-family:'Wix Madefor Text',sans-serif;font-weight:400;line-height:1.7;font-size:16px}.header-bar{background:#0E1C42;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}.header-title{font-family:'Wix Madefor Display',sans-serif;font-weight:800;font-size:18px;color:#fff}.header-sub{font-size:13px;color:#55C8E8;font-weight:500}.header-badge{background:linear-gradient(135deg,#C7922C,#8a6420);color:#fff;font-family:'Wix Madefor Display',sans-serif;font-weight:700;font-size:12px;padding:6px 16px;border-radius:20px;text-transform:uppercase}.hero{background:linear-gradient(135deg,#0E1C42 0%,#1a1a3e 30%,#67308F 70%,#C7922C 100%);padding:48px 24px;text-align:center}.hero h1{font-family:'Wix Madefor Display',sans-serif;font-weight:800;font-size:clamp(24px,4.5vw,36px);color:#fff;margin-bottom:8px}.hero p{color:#c8d6e8;font-size:17px;max-width:600px;margin:0 auto}.progress-container{max-width:800px;margin:0 auto;padding:24px 24px 0}.progress-bar-bg{background:#1a1a2e;border-radius:12px;height:14px;overflow:hidden}.progress-bar-fill{height:100%;border-radius:12px;background:linear-gradient(90deg,#55C8E8,#C7922C);transition:width .5s ease}.progress-text{font-size:13px;color:#8899aa;margin-top:6px;text-align:right;font-weight:500}.content{max-width:800px;margin:0 auto;padding:24px}.phase-label{font-family:'Wix Madefor Display',sans-serif;font-weight:700;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#C7922C;margin-bottom:16px}.scenario-box{background:#111122;border-radius:12px;padding:20px 24px;margin-bottom:24px;border:1px solid rgba(199,146,44,.3)}.scenario-label{font-family:'Wix Madefor Display',sans-serif;font-weight:700;font-size:12px;color:#C7922C;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}.question-text{font-family:'Wix Madefor Display',sans-serif;font-weight:700;font-size:19px;color:#fff;margin-bottom:20px;line-height:1.4}.question-counter{font-size:13px;color:#8899aa;margin-bottom:8px;font-weight:500}.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}@media(max-width:600px){.options-grid{grid-template-columns:1fr}}.option-btn{background:#111122;border:2px solid #2a2a4a;border-radius:12px;padding:16px 18px;color:#c8d6e8;font-family:'Wix Madefor Text',sans-serif;font-size:15px;font-weight:500;cursor:pointer;text-align:left;transition:all .2s ease;line-height:1.5}.option-btn:hover{border-color:#C7922C;background:#161630}.option-btn.correct{border-color:#76C043;background:rgba(118,192,67,.12);color:#fff}.option-btn.incorrect{border-color:#e74c5a;background:rgba(231,76,90,.1);color:#aaa}.option-btn.disabled{pointer-events:none}.feedback{border-radius:12px;padding:18px 22px;margin-top:16px;display:none;line-height:1.6}.feedback.correct{background:rgba(118,192,67,.1);border-left:4px solid #76C043}.feedback.incorrect{background:rgba(231,76,90,.08);border-left:4px solid #e74c5a}.feedback-title{font-family:'Wix Madefor Display',sans-serif;font-weight:700;font-size:15px;margin-bottom:6px}.feedback.correct .feedback-title{color:#76C043}.feedback.incorrect .feedback-title{color:#e74c5a}.feedback p{color:#c8d6e8;font-size:14px}.next-btn{display:none;margin-top:20px;background:linear-gradient(135deg,#C7922C,#8a6420);color:#fff;border:none;border-radius:10px;padding:14px 32px;font-family:'Wix Madefor Display',sans-serif;font-weight:700;font-size:15px;cursor:pointer;transition:transform .15s}.next-btn:hover{transform:scale(1.03)}.results-screen{display:none;text-align:center;padding:48px 24px}.score-circle{width:180px;height:180px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-family:'Wix Madefor Display',sans-serif;font-weight:800;font-size:48px;color:#fff}.score-label{font-size:15px;color:#8899aa;margin-bottom:8px}.score-msg{font-family:'Wix Madefor Display',sans-serif;font-weight:700;font-size:24px;color:#fff;margin-bottom:8px}.score-detail{color:#c8d6e8;max-width:500px;margin:0 auto 32px}.retry-btn{background:linear-gradient(135deg,#C7922C,#8a6420);color:#fff;border:none;border-radius:10px;padding:14px 36px;font-family:'Wix Madefor Display',sans-serif;font-weight:700;font-size:15px;cursor:pointer}.hidden{display:none!important}</style>
</head>
<body>
    <div class="header-bar"><div><div class="header-title">Personal Finance &amp; Money Management Honors</div><div class="header-sub">Optima Academy Online</div></div><div class="header-badge">Activity · Week 16 · Final Review</div></div>
    <div class="hero"><h1>🏆 Final Review Game</h1><p>10 questions from all 7 units — one last challenge before your final exam.</p></div>
    <div class="progress-container"><div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div><div class="progress-text" id="progressText">Question 1 of 10</div></div>
    <div class="content" id="quizArea"><div id="phaseLabel" class="phase-label"></div><div id="scenarioBox" class="scenario-box hidden"><div class="scenario-label">📋 SCENARIO</div><div id="scenarioText"></div></div><div class="question-counter" id="questionCounter"></div><div class="question-text" id="questionText"></div><div class="options-grid" id="optionsGrid"></div><div class="feedback" id="feedbackBox"><div class="feedback-title" id="feedbackTitle"></div><p id="feedbackText"></p></div><button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next Question →</button></div>
    <div class="results-screen" id="resultsScreen"><div class="score-label">FINAL REVIEW SCORE</div><div class="score-circle" id="scoreCircle"></div><div class="score-msg" id="scoreMsg"></div><div class="score-detail" id="scoreDetail"></div><button class="retry-btn" onclick="restartQuiz()">Play Again</button></div>
<script>
const questions=[
{phase:"UNIT 1 — BEHAVIORAL ECONOMICS",scenario:"",question:"A store prices a jacket at $200, then puts it 'on sale' for $120. You feel like you're saving $80, even though you didn't plan to buy a jacket. What cognitive bias is at work?",options:["Loss aversion","Anchoring effect — the $200 'original price' makes $120 feel like a deal","Instant gratification bias","The sunk cost fallacy"],correct:1,correctFeedback:"The anchoring effect causes you to rely heavily on the first piece of information (the $200 price) when making decisions. The 'original' price anchors your perception, making $120 feel like a steal — even if the jacket was never truly worth $200.",incorrectFeedback:"This is the anchoring effect — the original $200 price tag anchors your perception of value, making the $120 'sale' price feel like a bargain even if you didn't need the jacket."},
{phase:"UNIT 3 — BUDGETING",scenario:"",question:"In the 50/30/20 rule, someone earning $4,000/month should allocate how much to savings and debt repayment?",options:["$2,000","$1,200","$800","$400"],correct:2,correctFeedback:"20% of $4,000 = $800 for savings and extra debt repayment. The other categories: 50% ($2,000) for needs, 30% ($1,200) for wants.",incorrectFeedback:"In the 50/30/20 rule, 20% goes to savings/debt. $4,000 × 0.20 = $800. Needs get 50% ($2,000) and wants get 30% ($1,200)."},
{phase:"UNIT 4 — SAVING & BANKING",scenario:"",question:"You deposit $2,000 at 5% simple interest for 3 years. What is the total interest earned?",options:["$100","$300","$315.25","$500"],correct:1,correctFeedback:"Simple interest: I = P × r × t = $2,000 × 0.05 × 3 = $300. (Note: compound interest would yield $315.25, but this question specifies simple interest.)",incorrectFeedback:"Simple interest formula: I = P × r × t = $2,000 × 0.05 × 3 = $300. With simple interest, you earn $100/year on the original principal only."},
{phase:"UNIT 4 — BANKING",scenario:"",question:"Which institution would likely offer the HIGHEST APY on a savings account?",options:["A large national bank with branches everywhere","A local credit union","An online-only bank","They all offer the same rates"],correct:2,correctFeedback:"Online banks consistently offer the highest APYs (often 4–5%) because they don't pay for physical branches, tellers, or building overhead. That savings gets passed to customers as higher interest rates.",incorrectFeedback:"Online banks offer the highest savings rates because they save on branch overhead costs. Typical rates: big bank 0.01–0.05%, credit union 0.25–1%, online bank 4–5%."},
{phase:"UNIT 5 — CREDIT",scenario:"You have a credit card with a $3,000 limit and an $1,100 balance.",question:"What is your credit utilization ratio, and is it above or below the recommended threshold?",options:["36.7% — above the recommended 30%","11% — well below 30%","30% — exactly at the threshold","50% — way above the recommended limit"],correct:0,correctFeedback:"$1,100 ÷ $3,000 = 0.367 = 36.7%. This is above the recommended 30% threshold, which could negatively impact your FICO score. To get below 30%, you'd need to reduce the balance to under $900.",incorrectFeedback:"Credit utilization = balance ÷ limit = $1,100 ÷ $3,000 = 36.7%. This exceeds the recommended 30%. To stay under 30%, keep the balance below $900 on a $3,000 limit."},
{phase:"UNIT 5 — LOANS",scenario:"",question:"A payday lender charges $15 per $100 for a 2-week loan. You borrow $600. What's your total repayment, and what does this translate to in APR?",options:["$615 total, about 30% APR","$690 total, approximately 391% APR","$600 total — payday loans are interest-free","$675 total, about 100% APR"],correct:1,correctFeedback:"$15 × 6 = $90 in fees. Total: $690. The APR equivalent: ($90 ÷ $600) × (365 ÷ 14) ≈ 391% APR. For comparison, even a high-rate credit card at 24% APR would only charge about $6 on $600 over two weeks.",incorrectFeedback:"Fee: $15 × 6 = $90. Total repayment: $690. To find APR: ($90/$600) × (365/14) ≈ 391%. Payday loans are among the most expensive forms of borrowing."},
{phase:"UNIT 6 — INVESTING",scenario:"",question:"Which statement about risk and return is TRUE?",options:["High returns are possible with zero risk if you find the right investment","Higher potential returns always come with higher risk — no exceptions","Government bonds are the highest-return investment available","Individual stocks are low-risk because big companies rarely fail"],correct:1,correctFeedback:"The risk-return principle is fundamental: higher potential return always means higher risk. There's no such thing as a guaranteed high-return, no-risk investment. Anyone claiming otherwise is selling a scam.",incorrectFeedback:"Higher potential return = higher risk, always. This is the most fundamental principle of investing. No legitimate investment guarantees high returns with no risk."},
{phase:"UNIT 6 — RETIREMENT",scenario:"",question:"Your employer offers a 401(k) with a 100% match up to 5%. You earn $50,000. You only contribute 3%. How much FREE money are you leaving on the table each year?",options:["$0 — you're getting the full match","$500","$1,000","$2,500"],correct:2,correctFeedback:"At 3%, you contribute $1,500 and get $1,500 match. At 5%, you'd contribute $2,500 and get $2,500 match. The difference: $2,500 − $1,500 = $1,000/year in free money lost. Over 30 years at 8%, that's roughly $120,000+ in lost wealth.",incorrectFeedback:"You're only getting a 3% match ($1,500) instead of the full 5% ($2,500). That's $1,000/year in free employer money you're missing. Always contribute enough to get the full match."},
{phase:"UNIT 7 — INSURANCE",scenario:"Your health insurance has a $1,500 deductible and 80/20 coinsurance. You receive a $6,000 medical bill.",question:"How much do you pay out of pocket?",options:["$1,500 (just the deductible)","$2,400 ($1,500 deductible + 20% of remaining $4,500)","$1,200 (20% of $6,000)","$6,000 (insurance doesn't cover this)"],correct:1,correctFeedback:"Step 1: Pay $1,500 deductible. Step 2: Remaining = $6,000 − $1,500 = $4,500. Step 3: Your 20% coinsurance = $4,500 × 0.20 = $900. Total: $1,500 + $900 = $2,400. Insurance pays the other $3,600.",incorrectFeedback:"Deductible first: $1,500. Remaining: $4,500. Your coinsurance (20%): $900. Total out of pocket: $1,500 + $900 = $2,400. Insurance covers $3,600."},
{phase:"UNIT 7 — IDENTITY THEFT",scenario:"",question:"What is the SINGLE most effective step to prevent your online accounts from being hacked?",options:["Using the same strong password for every account","Enabling two-factor authentication (2FA) on all financial accounts","Changing your password once a year","Never shopping online"],correct:1,correctFeedback:"Two-factor authentication requires both your password AND a second verification (phone code, fingerprint). Even if someone steals your password, they can't access your account without the second factor. This single step prevents the vast majority of account hacks.",incorrectFeedback:"2FA is the most effective protection — it adds a second layer beyond passwords. Even if your password is stolen, the hacker can't log in without your phone's verification code."}
];
let currentQuestion=0,score=0,answered=false;
function renderQuestion(){const q=questions[currentQuestion];document.getElementById('progressFill').style.width=((currentQuestion)/questions.length*100)+'%';document.getElementById('progressText').textContent=`Question ${currentQuestion+1} of ${questions.length}`;const pl=document.getElementById('phaseLabel');pl.textContent=q.phase;pl.classList.remove('hidden');const sb=document.getElementById('scenarioBox');if(q.scenario){document.getElementById('scenarioText').innerHTML=`<p style="color:#c8d6e8;margin:0;">${q.scenario}</p>`;sb.classList.remove('hidden')}else{sb.classList.add('hidden')}document.getElementById('questionCounter').textContent=`Question ${currentQuestion+1} of ${questions.length}`;document.getElementById('questionText').textContent=q.question;const grid=document.getElementById('optionsGrid');grid.innerHTML='';q.options.forEach((opt,i)=>{const btn=document.createElement('button');btn.className='option-btn';btn.textContent=opt;btn.onclick=()=>selectAnswer(i);grid.appendChild(btn)});document.getElementById('feedbackBox').style.display='none';document.getElementById('nextBtn').style.display='none';answered=false}
function selectAnswer(index){if(answered)return;answered=true;const q=questions[currentQuestion];const buttons=document.querySelectorAll('.option-btn');const isCorrect=index===q.correct;buttons.forEach((btn,i)=>{btn.classList.add('disabled');if(i===q.correct)btn.classList.add('correct');if(i===index&&!isCorrect)btn.classList.add('incorrect')});if(isCorrect)score++;const fb=document.getElementById('feedbackBox');fb.className='feedback '+(isCorrect?'correct':'incorrect');document.getElementById('feedbackTitle').textContent=isCorrect?'✅ Correct!':'❌ Not Quite';document.getElementById('feedbackText').textContent=isCorrect?q.correctFeedback:q.incorrectFeedback;fb.style.display='block';document.getElementById('nextBtn').style.display='inline-block';document.getElementById('nextBtn').textContent=currentQuestion<questions.length-1?'Next Question →':'See Final Score →'}
function nextQuestion(){currentQuestion++;if(currentQuestion>=questions.length){showResults()}else{renderQuestion();window.scrollTo({top:0,behavior:'smooth'})}}
function showResults(){document.getElementById('quizArea').style.display='none';document.querySelector('.progress-container').style.display='none';const pct=Math.round((score/questions.length)*100);let gradient,msg,detail;if(pct>=90){gradient='linear-gradient(135deg,#76C043,#4a8a20)';msg='🏆 Outstanding!';detail=`You scored ${score}/${questions.length} (${pct}%). You've mastered personal finance across all 7 units. You're ready for the final exam!`}else if(pct>=70){gradient='linear-gradient(135deg,#C7922C,#8a6420)';msg='💪 Strong Finish!';detail=`You scored ${score}/${questions.length} (${pct}%). Great overall knowledge! Review the units you missed to perfect your understanding before the final.`}else if(pct>=50){gradient='linear-gradient(135deg,#F78F1E,#c46a0a)';msg='📚 Almost There!';detail=`You scored ${score}/${questions.length} (${pct}%). You know the basics, but review the unit summaries in the Week 16 reading to strengthen weak areas.`}else{gradient='linear-gradient(135deg,#e74c5a,#b83040)';msg='📖 More Review Needed';detail=`You scored ${score}/${questions.length} (${pct}%). Go back through the Week 16 review reading and retake unit activities before attempting the final exam.`}document.getElementById('resultsScreen').style.display='block';document.getElementById('scoreCircle').style.background=gradient;document.getElementById('scoreCircle').textContent=`${pct}%`;document.getElementById('scoreMsg').textContent=msg;document.getElementById('scoreDetail').textContent=detail;document.getElementById('progressFill').style.width='100%'}
function restartQuiz(){currentQuestion=0;score=0;document.getElementById('resultsScreen').style.display='none';document.getElementById('quizArea').style.display='block';document.querySelector('.progress-container').style.display='block';renderQuestion();window.scrollTo({top:0,behavior:'smooth'})}
renderQuestion();
</script>
</body>
</html>
