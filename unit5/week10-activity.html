<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Week 10 Activity: Loan Detective Challenge</title>
    <link href="https://fonts.googleapis.com/css2?family=Wix+Madefor+Display:wght@700;800&family=Wix+Madefor+Text:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}body{background:#0a0a14;color:#e2e8f0;font-family:'Wix Madefor Text',sans-serif;font-weight:400;line-height:1.7;font-size:16px}.header-bar{background:#0E1C42;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}.header-title{font-family:'Wix Madefor Display',sans-serif;font-weight:800;font-size:18px;color:#fff;letter-spacing:.5px}.header-sub{font-size:13px;color:#55C8E8;font-weight:500}.header-badge{background:linear-gradient(135deg,#F78F1E,#c46a0a);color:#fff;font-family:'Wix Madefor Display',sans-serif;font-weight:700;font-size:12px;padding:6px 16px;border-radius:20px;letter-spacing:.5px;text-transform:uppercase}.hero{background:linear-gradient(135deg,#0E1C42 0%,#1a1a3e 40%,#67308F 100%);padding:48px 24px;text-align:center}.hero h1{font-family:'Wix Madefor Display',sans-serif;font-weight:800;font-size:clamp(24px,4.5vw,36px);color:#fff;margin-bottom:8px}.hero p{color:#c8d6e8;font-size:17px;max-width:600px;margin:0 auto}.progress-container{max-width:800px;margin:0 auto;padding:24px 24px 0}.progress-bar-bg{background:#1a1a2e;border-radius:12px;height:14px;overflow:hidden}.progress-bar-fill{height:100%;border-radius:12px;background:linear-gradient(90deg,#55C8E8,#76C043);transition:width .5s ease}.progress-text{font-size:13px;color:#8899aa;margin-top:6px;text-align:right;font-weight:500}.content{max-width:800px;margin:0 auto;padding:24px}.phase-label{font-family:'Wix Madefor Display',sans-serif;font-weight:700;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#55C8E8;margin-bottom:16px}.scenario-box{background:#111122;border-radius:12px;padding:20px 24px;margin-bottom:24px;border:1px solid rgba(247,143,30,.2)}.scenario-label{font-family:'Wix Madefor Display',sans-serif;font-weight:700;font-size:12px;color:#F78F1E;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}.question-text{font-family:'Wix Madefor Display',sans-serif;font-weight:700;font-size:19px;color:#fff;margin-bottom:20px;line-height:1.4}.question-counter{font-size:13px;color:#8899aa;margin-bottom:8px;font-weight:500}.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}@media(max-width:600px){.options-grid{grid-template-columns:1fr}}.option-btn{background:#111122;border:2px solid #2a2a4a;border-radius:12px;padding:16px 18px;color:#c8d6e8;font-family:'Wix Madefor Text',sans-serif;font-size:15px;font-weight:500;cursor:pointer;text-align:left;transition:all .2s ease;line-height:1.5}.option-btn:hover{border-color:#55C8E8;background:#161630}.option-btn.correct{border-color:#76C043;background:rgba(118,192,67,.12);color:#fff}.option-btn.incorrect{border-color:#e74c5a;background:rgba(231,76,90,.1);color:#aaa}.option-btn.disabled{pointer-events:none}.feedback{border-radius:12px;padding:18px 22px;margin-top:16px;display:none;line-height:1.6}.feedback.correct{background:rgba(118,192,67,.1);border-left:4px solid #76C043}.feedback.incorrect{background:rgba(231,76,90,.08);border-left:4px solid #e74c5a}.feedback-title{font-family:'Wix Madefor Display',sans-serif;font-weight:700;font-size:15px;margin-bottom:6px}.feedback.correct .feedback-title{color:#76C043}.feedback.incorrect .feedback-title{color:#e74c5a}.feedback p{color:#c8d6e8;font-size:14px}.next-btn{display:none;margin-top:20px;background:linear-gradient(135deg,#55C8E8,#0E5568);color:#fff;border:none;border-radius:10px;padding:14px 32px;font-family:'Wix Madefor Display',sans-serif;font-weight:700;font-size:15px;cursor:pointer;letter-spacing:.5px;transition:transform .15s}.next-btn:hover{transform:scale(1.03)}.results-screen{display:none;text-align:center;padding:48px 24px}.score-circle{width:160px;height:160px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-family:'Wix Madefor Display',sans-serif;font-weight:800;font-size:42px;color:#fff}.score-label{font-size:15px;color:#8899aa;margin-bottom:8px}.score-msg{font-family:'Wix Madefor Display',sans-serif;font-weight:700;font-size:22px;color:#fff;margin-bottom:8px}.score-detail{color:#c8d6e8;max-width:500px;margin:0 auto 32px}.retry-btn{background:linear-gradient(135deg,#F78F1E,#c46a0a);color:#fff;border:none;border-radius:10px;padding:14px 36px;font-family:'Wix Madefor Display',sans-serif;font-weight:700;font-size:15px;cursor:pointer}.retry-btn:hover{transform:scale(1.03)}.hidden{display:none!important}
    </style>
</head>
<body>
    <div class="header-bar"><div><div class="header-title">Personal Finance &amp; Money Management Honors</div><div class="header-sub">Optima Academy Online</div></div><div class="header-badge">Activity · Week 10</div></div>
    <div class="hero"><h1>Loan Detective Challenge</h1><p>Compare loan offers, spot predatory terms, and calculate the true cost of borrowing.</p></div>
    <div class="progress-container"><div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div><div class="progress-text" id="progressText">Question 1 of 10</div></div>
    <div class="content" id="quizArea"><div id="phaseLabel" class="phase-label"></div><div id="scenarioBox" class="scenario-box hidden"><div class="scenario-label">📋 SCENARIO</div><div id="scenarioText"></div></div><div class="question-counter" id="questionCounter"></div><div class="question-text" id="questionText"></div><div class="options-grid" id="optionsGrid"></div><div class="feedback" id="feedbackBox"><div class="feedback-title" id="feedbackTitle"></div><p id="feedbackText"></p></div><button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next Question →</button></div>
    <div class="results-screen" id="resultsScreen"><div class="score-label">YOUR SCORE</div><div class="score-circle" id="scoreCircle"></div><div class="score-msg" id="scoreMsg"></div><div class="score-detail" id="scoreDetail"></div><button class="retry-btn" onclick="restartQuiz()">Try Again</button></div>
<script>
const questions=[
{phase:"PHASE 1: UNDERSTANDING LOAN TYPES",scenario:"Zara just graduated from high school in Miami and is planning for college and a car. She's comparing different borrowing options.",question:"Zara is choosing between a federal subsidized student loan and a private student loan. Which should she choose first, and why?",options:["Private — they usually have lower rates","Federal subsidized — the government pays interest while she's in school","Either one — they work exactly the same","She should avoid all student loans entirely"],correct:1,correctFeedback:"Federal subsidized loans don't charge interest while you're enrolled at least half-time — the government covers it. Private loans start accruing interest immediately. Always exhaust federal options first.",incorrectFeedback:"Federal subsidized loans are always the first choice because the government pays the interest while you're in school. Private loans start accruing interest from day one and lack the flexible repayment options federal loans offer."},
{phase:"",scenario:"",question:"An auto loan is a 'secured' loan. What does this mean?",options:["It's guaranteed to be approved","The loan is backed by collateral — the car — which the lender can repossess if you don't pay","It has a fixed interest rate that can never change","It's protected by FDIC insurance"],correct:1,correctFeedback:"'Secured' means the loan is backed by an asset (collateral). For auto loans, the car itself is the collateral. If you stop making payments, the lender can repossess the vehicle to recover their money.",incorrectFeedback:"A secured loan uses collateral — an asset the lender can seize if you default. For auto loans, the car is the collateral. This is why auto loan rates are typically lower than unsecured loan rates — the lender has a backup."},
{phase:"",scenario:"",question:"Why are payday loans considered a 'debt trap'?",options:["Because they have low interest rates that seem too good","Because borrowers are required to take out insurance","Because most borrowers can't repay on time and must roll the loan over, paying more fees each time","Because they require a high credit score to qualify"],correct:2,correctFeedback:"Nearly 80% of payday loans are rolled over or immediately followed by another loan. Each rollover adds new fees, turning a small loan into a much larger debt. A $300 payday loan can easily cost $600+ after multiple rollovers.",incorrectFeedback:"Payday loans trap borrowers because most can't repay the full amount plus fees in just two weeks. They 'roll over' the loan, paying another round of fees. This cycle repeats, turning a small loan into a massive debt."},
{phase:"",scenario:"",question:"A payday lender charges $15 per $100 for a 2-week loan. If you borrow $400, what is the total amount you owe in two weeks?",options:["$415","$460","$400","$500"],correct:1,correctFeedback:"$15 per $100 × 4 = $60 in fees. $400 + $60 = $460 owed in just two weeks. That $60 fee for two weeks translates to an APR of approximately 391%. For comparison, even a high-rate credit card at 24% APR would only charge about $8 on $400 over two weeks.",incorrectFeedback:"Calculate: $15 fee per $100 borrowed × 4 (for $400) = $60 in fees. Total owed: $400 + $60 = $460 in just 14 days. This translates to roughly 391% APR — far more expensive than any credit card."},
{phase:"PHASE 2: AMORTIZATION & LOAN MATH",scenario:"Jordan takes out a $15,000 auto loan at 6% APR for 60 months (5 years). His monthly payment is $290.",question:"In Jordan's first payment of $290, approximately how much goes to interest? (Hint: monthly interest = balance × APR ÷ 12)",options:["$290 — the entire first payment is interest","$75 — ($15,000 × 0.06 ÷ 12)","$25 — interest is always a small portion","$150 — exactly half the payment"],correct:1,correctFeedback:"Monthly interest = $15,000 × (0.06 ÷ 12) = $15,000 × 0.005 = $75. So of Jordan's $290 payment, $75 goes to interest and $215 goes toward reducing the principal. Over time, as the balance drops, more of each payment will go to principal.",incorrectFeedback:"Use the formula: $15,000 × (0.06 ÷ 12) = $75 in interest for the first month. The remaining $215 of his $290 payment reduces the principal. This is how amortization works — interest is calculated on the remaining balance."},
{phase:"",scenario:"",question:"Why do early loan payments contain a larger proportion of interest compared to later payments?",options:["Banks charge higher rates in the first year","Because the balance is highest at the start, so interest charges are larger","Because early payments are smaller than later ones","Lenders add extra fees to the first few payments"],correct:1,correctFeedback:"Interest is calculated as a percentage of the remaining balance. When the balance is highest (at the start), interest charges are larger. As you pay down the principal, the balance shrinks, so interest charges decrease and more of each payment goes to principal.",incorrectFeedback:"Interest is a percentage of the remaining balance. Larger balance = larger interest charge. As you make payments and the balance decreases, interest shrinks and more of each payment reduces the principal. This is the core of amortization."},
{phase:"",scenario:"",question:"Jordan gets a $500 bonus and makes an extra payment toward his auto loan in Month 3. What is the primary benefit?",options:["It reduces his credit score","The extra $500 goes entirely to principal, reducing the balance that future interest is calculated on","It has no effect because the loan term is fixed","He'll be charged a prepayment penalty"],correct:1,correctFeedback:"Extra payments go directly to principal (not interest), which immediately lowers the balance. Since interest is calculated on the remaining balance, this means every future payment has a smaller interest portion — saving Jordan money over the life of the loan.",incorrectFeedback:"Extra payments reduce principal directly. Since interest is calculated on the remaining balance, a lower balance means less interest charged in every future month. Making extra payments early in a loan saves the most because it reduces interest charges for the longest period."},
{phase:"PHASE 3: SPOTTING PREDATORY LENDING",scenario:"Keisha needs $1,000 for an emergency car repair. She's comparing three borrowing options.",question:"Option A: Credit union personal loan at 9% APR, 12-month term. Option B: Credit card at 22% APR. Option C: Payday loan at $15 per $100, due in 2 weeks. Which is the LEAST expensive option?",options:["Option C — it's only $15 per $100","Option B — credit cards are always cheapest","Option A — the credit union loan has the lowest APR at 9%","They all cost about the same"],correct:2,correctFeedback:"Option A at 9% APR costs about $50 in total interest over 12 months. Option B at 22% APR costs about $122 if paid over 12 months. Option C costs $150 in just 2 weeks (391% APR equivalent). The credit union loan is by far the cheapest option.",incorrectFeedback:"Compare total costs: Credit union at 9% APR = ~$50 total interest over 12 months. Credit card at 22% = ~$122 over 12 months. Payday loan = $150 in fees for just 2 weeks (391% APR). Always compare APR, not just the dollar amount of fees."},
{phase:"",scenario:"A car dealership ad says: 'Bad credit? No credit? No problem! Drive away today for just $99/month! No credit check needed!'",question:"What red flags should Keisha look for if she visits this dealership?",options:["There are no red flags — $99/month is a great deal","'No credit check' likely means extremely high APR, and the $99 payment could be for a very long term or have a balloon payment at the end","The dealership is probably just being generous to attract customers","She should sign immediately before the offer expires"],correct:1,correctFeedback:"Multiple red flags: 'No credit check' almost always means very high APR (15%–25%+). A $99/month payment could mean an extremely long term (84+ months) or a huge balloon payment at the end. The urgency language ('drive away today') is a pressure tactic. Always read the full terms.",incorrectFeedback:"'No credit check' is a major red flag — it means the lender plans to charge very high rates. The low monthly payment likely hides a very long term, balloon payment, or both. Pressure to sign immediately is another predatory tactic. Always compare offers and read the fine print."},
{phase:"",scenario:"",question:"Which of the following is a prepayment penalty, and why is it a red flag?",options:["A fee for making your regular monthly payment late","A fee charged if you pay off your loan early — it's a red flag because it discourages escaping high-interest debt","A fee for opening the loan account","A discount for paying ahead of schedule"],correct:1,correctFeedback:"A prepayment penalty punishes you for paying off debt early. This is a red flag because legitimate lenders want you to succeed. Predatory lenders profit from keeping you in debt as long as possible — a prepayment penalty ensures you keep paying interest.",incorrectFeedback:"A prepayment penalty is a fee for paying off a loan before its term ends. It's a red flag because it traps borrowers in high-interest debt by making it expensive to pay off the loan early. Ethical lenders don't penalize responsible repayment."}
];

let currentQuestion=0,score=0,answered=false;
function renderQuestion(){const q=questions[currentQuestion];document.getElementById('progressFill').style.width=((currentQuestion)/questions.length*100)+'%';document.getElementById('progressText').textContent=`Question ${currentQuestion+1} of ${questions.length}`;const pl=document.getElementById('phaseLabel');if(q.phase){pl.textContent=q.phase;pl.classList.remove('hidden')}else{pl.classList.add('hidden')}const sb=document.getElementById('scenarioBox');if(q.scenario){document.getElementById('scenarioText').innerHTML=`<p style="color:#c8d6e8;margin:0;">${q.scenario}</p>`;sb.classList.remove('hidden')}else{sb.classList.add('hidden')}document.getElementById('questionCounter').textContent=`Question ${currentQuestion+1} of ${questions.length}`;document.getElementById('questionText').textContent=q.question;const grid=document.getElementById('optionsGrid');grid.innerHTML='';q.options.forEach((opt,i)=>{const btn=document.createElement('button');btn.className='option-btn';btn.textContent=opt;btn.onclick=()=>selectAnswer(i);grid.appendChild(btn)});document.getElementById('feedbackBox').style.display='none';document.getElementById('nextBtn').style.display='none';answered=false}
function selectAnswer(index){if(answered)return;answered=true;const q=questions[currentQuestion];const buttons=document.querySelectorAll('.option-btn');const isCorrect=index===q.correct;buttons.forEach((btn,i)=>{btn.classList.add('disabled');if(i===q.correct)btn.classList.add('correct');if(i===index&&!isCorrect)btn.classList.add('incorrect')});if(isCorrect)score++;const fb=document.getElementById('feedbackBox');fb.className='feedback '+(isCorrect?'correct':'incorrect');document.getElementById('feedbackTitle').textContent=isCorrect?'✅ Correct!':'❌ Not Quite';document.getElementById('feedbackText').textContent=isCorrect?q.correctFeedback:q.incorrectFeedback;fb.style.display='block';document.getElementById('nextBtn').style.display='inline-block';document.getElementById('nextBtn').textContent=currentQuestion<questions.length-1?'Next Question →':'See Results →'}
function nextQuestion(){currentQuestion++;if(currentQuestion>=questions.length){showResults()}else{renderQuestion();window.scrollTo({top:0,behavior:'smooth'})}}
function showResults(){document.getElementById('quizArea').style.display='none';document.querySelector('.progress-container').style.display='none';const pct=Math.round((score/questions.length)*100);let gradient,msg,detail;if(pct>=80){gradient='linear-gradient(135deg,#76C043,#4a8a20)';msg='Excellent Work!';detail=`You scored ${score}/${questions.length} (${pct}%). You can compare loans, spot predatory terms, and calculate the true cost of borrowing. You're loan-literate!`}else if(pct>=60){gradient='linear-gradient(135deg,#C7922C,#a07520)';msg='Good Effort!';detail=`You scored ${score}/${questions.length} (${pct}%). You're getting there! Review amortization and predatory lending red flags to strengthen your skills.`}else{gradient='linear-gradient(135deg,#e74c5a,#b83040)';msg='Keep Practicing!';detail=`You scored ${score}/${questions.length} (${pct}%). Revisit the Week 10 reading on loan types, amortization, and predatory lending, then try again.`}document.getElementById('resultsScreen').style.display='block';document.getElementById('scoreCircle').style.background=gradient;document.getElementById('scoreCircle').textContent=`${pct}%`;document.getElementById('scoreMsg').textContent=msg;document.getElementById('scoreDetail').textContent=detail;document.getElementById('progressFill').style.width='100%'}
function restartQuiz(){currentQuestion=0;score=0;document.getElementById('resultsScreen').style.display='none';document.getElementById('quizArea').style.display='block';document.querySelector('.progress-container').style.display='block';renderQuestion();window.scrollTo({top:0,behavior:'smooth'})}
renderQuestion();
</script>
</body>
</html>
