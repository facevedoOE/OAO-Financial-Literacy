<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Week 9 Activity: Credit IQ Challenge</title>
    <link href="https://fonts.googleapis.com/css2?family=Wix+Madefor+Display:wght@700;800&family=Wix+Madefor+Text:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}body{background:#0a0a14;color:#e2e8f0;font-family:'Wix Madefor Text',sans-serif;font-weight:400;line-height:1.7;font-size:16px}.header-bar{background:#0E1C42;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}.header-title{font-family:'Wix Madefor Display',sans-serif;font-weight:800;font-size:18px;color:#fff;letter-spacing:.5px}.header-sub{font-size:13px;color:#55C8E8;font-weight:500}.header-badge{background:linear-gradient(135deg,#F78F1E,#c46a0a);color:#fff;font-family:'Wix Madefor Display',sans-serif;font-weight:700;font-size:12px;padding:6px 16px;border-radius:20px;letter-spacing:.5px;text-transform:uppercase}.hero{background:linear-gradient(135deg,#0E1C42 0%,#1a1a3e 40%,#67308F 100%);padding:48px 24px;text-align:center}.hero h1{font-family:'Wix Madefor Display',sans-serif;font-weight:800;font-size:clamp(24px,4.5vw,36px);color:#fff;margin-bottom:8px}.hero p{color:#c8d6e8;font-size:17px;max-width:600px;margin:0 auto}.progress-container{max-width:800px;margin:0 auto;padding:24px 24px 0}.progress-bar-bg{background:#1a1a2e;border-radius:12px;height:14px;overflow:hidden}.progress-bar-fill{height:100%;border-radius:12px;background:linear-gradient(90deg,#55C8E8,#76C043);transition:width .5s ease}.progress-text{font-size:13px;color:#8899aa;margin-top:6px;text-align:right;font-weight:500}.content{max-width:800px;margin:0 auto;padding:24px}.phase-label{font-family:'Wix Madefor Display',sans-serif;font-weight:700;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#55C8E8;margin-bottom:16px}.scenario-box{background:#111122;border-radius:12px;padding:20px 24px;margin-bottom:24px;border:1px solid rgba(247,143,30,.2)}.scenario-label{font-family:'Wix Madefor Display',sans-serif;font-weight:700;font-size:12px;color:#F78F1E;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}.question-text{font-family:'Wix Madefor Display',sans-serif;font-weight:700;font-size:19px;color:#fff;margin-bottom:20px;line-height:1.4}.question-counter{font-size:13px;color:#8899aa;margin-bottom:8px;font-weight:500}.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}@media(max-width:600px){.options-grid{grid-template-columns:1fr}}.option-btn{background:#111122;border:2px solid #2a2a4a;border-radius:12px;padding:16px 18px;color:#c8d6e8;font-family:'Wix Madefor Text',sans-serif;font-size:15px;font-weight:500;cursor:pointer;text-align:left;transition:all .2s ease;line-height:1.5}.option-btn:hover{border-color:#55C8E8;background:#161630}.option-btn.correct{border-color:#76C043;background:rgba(118,192,67,.12);color:#fff}.option-btn.incorrect{border-color:#e74c5a;background:rgba(231,76,90,.1);color:#aaa}.option-btn.disabled{pointer-events:none}.feedback{border-radius:12px;padding:18px 22px;margin-top:16px;display:none;line-height:1.6}.feedback.correct{background:rgba(118,192,67,.1);border-left:4px solid #76C043}.feedback.incorrect{background:rgba(231,76,90,.08);border-left:4px solid #e74c5a}.feedback-title{font-family:'Wix Madefor Display',sans-serif;font-weight:700;font-size:15px;margin-bottom:6px}.feedback.correct .feedback-title{color:#76C043}.feedback.incorrect .feedback-title{color:#e74c5a}.feedback p{color:#c8d6e8;font-size:14px}.next-btn{display:none;margin-top:20px;background:linear-gradient(135deg,#55C8E8,#0E5568);color:#fff;border:none;border-radius:10px;padding:14px 32px;font-family:'Wix Madefor Display',sans-serif;font-weight:700;font-size:15px;cursor:pointer;letter-spacing:.5px;transition:transform .15s}.next-btn:hover{transform:scale(1.03)}.results-screen{display:none;text-align:center;padding:48px 24px}.score-circle{width:160px;height:160px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-family:'Wix Madefor Display',sans-serif;font-weight:800;font-size:42px;color:#fff}.score-label{font-size:15px;color:#8899aa;margin-bottom:8px}.score-msg{font-family:'Wix Madefor Display',sans-serif;font-weight:700;font-size:22px;color:#fff;margin-bottom:8px}.score-detail{color:#c8d6e8;max-width:500px;margin:0 auto 32px}.retry-btn{background:linear-gradient(135deg,#F78F1E,#c46a0a);color:#fff;border:none;border-radius:10px;padding:14px 36px;font-family:'Wix Madefor Display',sans-serif;font-weight:700;font-size:15px;cursor:pointer}.retry-btn:hover{transform:scale(1.03)}.hidden{display:none!important}
    </style>
</head>
<body>
    <div class="header-bar"><div><div class="header-title">Personal Finance &amp; Money Management Honors</div><div class="header-sub">Optima Academy Online</div></div><div class="header-badge">Activity · Week 9</div></div>
    <div class="hero"><h1>Credit IQ Challenge</h1><p>Calculate APR costs, evaluate credit offers, and protect your FICO score.</p></div>
    <div class="progress-container"><div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div><div class="progress-text" id="progressText">Question 1 of 10</div></div>
    <div class="content" id="quizArea"><div id="phaseLabel" class="phase-label"></div><div id="scenarioBox" class="scenario-box hidden"><div class="scenario-label">📋 SCENARIO</div><div id="scenarioText"></div></div><div class="question-counter" id="questionCounter"></div><div class="question-text" id="questionText"></div><div class="options-grid" id="optionsGrid"></div><div class="feedback" id="feedbackBox"><div class="feedback-title" id="feedbackTitle"></div><p id="feedbackText"></p></div><button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next Question →</button></div>
    <div class="results-screen" id="resultsScreen"><div class="score-label">YOUR SCORE</div><div class="score-circle" id="scoreCircle"></div><div class="score-msg" id="scoreMsg"></div><div class="score-detail" id="scoreDetail"></div><button class="retry-btn" onclick="restartQuiz()">Try Again</button></div>
<script>
const questions=[
{phase:"PHASE 1: CREDIT CARD FUNDAMENTALS",scenario:"Darius, a college freshman in Orlando, just got his first credit card with a $1,500 limit and 21% APR. He's excited but wants to use it responsibly.",question:"If Darius pays his full statement balance every month by the due date, how much interest will he pay?",options:["21% of every purchase","A flat monthly fee of $25","Zero — paying in full during the grace period means no interest","He still pays interest, just at a reduced rate"],correct:2,correctFeedback:"If you pay your full balance by the due date, the grace period protects you from interest charges. This is the #1 rule of responsible credit card use — pay in full, pay no interest.",incorrectFeedback:"When you pay the full statement balance by the due date, you pay zero interest. The grace period (typically 21–25 days) means no interest accrues if the balance is paid in full each cycle."},
{phase:"",scenario:"",question:"Darius charges $800 on his card and can only afford to pay the $25 minimum this month. What happens to the remaining $775?",options:["It disappears — the bank forgives it","It carries over to next month and starts accruing interest at 21% APR","It's automatically paid from his savings account","He gets 90 days interest-free to pay it off"],correct:1,correctFeedback:"The unpaid $775 carries over and starts accruing interest at 21% APR. Monthly interest: $775 × (21% ÷ 12) ≈ $13.56. That interest gets added to the balance, and next month he owes even more.",incorrectFeedback:"Any unpaid balance carries over and accrues interest. At 21% APR, the monthly rate is about 1.75%. On $775, that's roughly $13.56 in interest added to his balance — and it compounds each month."},
{phase:"",scenario:"",question:"Darius has a $1,500 credit limit and a $600 balance. What is his credit utilization ratio?",options:["6%","40%","60%","25%"],correct:1,correctFeedback:"Credit utilization = balance ÷ limit × 100 = $600 ÷ $1,500 × 100 = 40%. This is above the recommended 30% threshold, which could negatively impact his credit score. He should try to keep his balance below $450.",incorrectFeedback:"Credit utilization = ($600 ÷ $1,500) × 100 = 40%. Experts recommend staying below 30% (which would be $450 on a $1,500 limit). At 40%, Darius's utilization is hurting his score."},
{phase:"",scenario:"",question:"Which credit card behavior would MOST damage Darius's FICO score?",options:["Using 25% of his credit limit","Paying his bill 2 days early every month","Missing a payment by 30+ days","Keeping his first credit card account open for years"],correct:2,correctFeedback:"Payment history is 35% of your FICO score — the biggest single factor. A payment that's 30+ days late gets reported to credit bureaus and can drop your score by 60–100 points. It stays on your report for 7 years.",incorrectFeedback:"Missing a payment by 30+ days is the most damaging action. Payment history makes up 35% of your FICO score. One late payment can cause a significant drop and remains on your credit report for 7 years."},
{phase:"PHASE 2: APR AND THE COST OF CREDIT",scenario:"Valentina is comparing two credit card offers. Card A: 18% APR, no annual fee, 2% cash back. Card B: 24% APR, $95 annual fee, 5% cash back on groceries.",question:"Valentina plans to pay her balance in full every month. Which card is likely the better choice for her?",options:["Card A — lower APR is always the most important factor","Card B — the 5% cash back makes it worth it no matter what","It depends on how much she spends on groceries vs. the $95 fee","Neither — she shouldn't use credit cards at all"],correct:2,correctFeedback:"Since Valentina pays in full each month, APR doesn't matter (she pays no interest). The real question is whether her grocery cash back exceeds the $95 fee. If she spends $200+/month on groceries, Card B's 5% earns $120+/year — worth more than the fee.",incorrectFeedback:"When you pay in full monthly, APR becomes irrelevant because you pay no interest. The decision should be based on whether the cash back rewards exceed the annual fee. At 5% on $200/month groceries, Card B earns $120/year — $25 more than the fee."},
{phase:"",scenario:"",question:"A credit card has 24% APR. You carry a $2,000 balance. Approximately how much interest are you charged in one month?",options:["$240","$40","$480","$24"],correct:1,correctFeedback:"Monthly interest = balance × (APR ÷ 12) = $2,000 × (0.24 ÷ 12) = $2,000 × 0.02 = $40. That $40 is added to your balance, so next month you'd owe $2,040 (minus any payments made).",incorrectFeedback:"Divide APR by 12 for the monthly rate: 24% ÷ 12 = 2%. Then multiply by the balance: $2,000 × 0.02 = $40 in monthly interest. This $40 gets added to your balance if unpaid."},
{phase:"",scenario:"",question:"Why is paying only the minimum payment on a credit card considered a 'trap'?",options:["Because banks charge a fee for minimum payments","Because most of the minimum payment goes to interest, barely reducing the actual balance","Because minimum payments aren't reported to credit bureaus","Because you lose your cash back rewards"],correct:1,correctFeedback:"When you make a minimum payment, most of it covers interest charges — very little goes toward your actual balance. On a $2,000 balance at 22% APR, a $40 minimum means ~$37 goes to interest and only ~$3 reduces the balance. At that rate, it takes 9+ years to pay off.",incorrectFeedback:"The minimum payment trap occurs because most of your payment goes toward interest, not the principal balance. For example, on a $2,000 balance at 22% APR, a $40 minimum only reduces the balance by about $3. The rest covers interest."},
{phase:"PHASE 3: CREDIT SCORES & BUILDING CREDIT",scenario:"Amara is 17 and wants to start building credit before she heads to college next year. She's researching the best way to establish a credit history.",question:"What is the BEST first step Amara can take to start building credit?",options:["Apply for multiple credit cards to show she's creditworthy","Become an authorized user on a parent's credit card","Take out a small personal loan she doesn't need","Wait until she's 25 to worry about credit"],correct:1,correctFeedback:"Becoming an authorized user on a parent's card with good history is the safest way to start building credit as a minor. The account's positive history can appear on Amara's credit report, giving her a head start without the risk of managing her own card.",incorrectFeedback:"The best first step is becoming an authorized user on a parent's card. This lets the parent's positive payment history contribute to Amara's credit report. Applying for multiple cards hurts your score, and waiting means missing years of credit-building."},
{phase:"",scenario:"Amara checks her credit report and sees a collection account she doesn't recognize. It's listed as a $150 unpaid medical bill from a doctor she's never visited.",question:"What should Amara do about this incorrect item on her credit report?",options:["Ignore it — small amounts don't affect your score","Pay it immediately to make it go away","File a dispute with the credit bureau to have it investigated and removed","Close all her credit accounts to prevent further errors"],correct:2,correctFeedback:"Amara should file a dispute directly with the credit bureau (Equifax, Experian, or TransUnion). By law, the bureau must investigate within 30 days. If the item can't be verified, it must be removed. Never pay a debt that isn't yours.",incorrectFeedback:"Never ignore or pay a debt that isn't yours. File a dispute with the credit bureau — they're legally required to investigate within 30 days. If the creditor can't verify the debt, it must be removed from your report."},
{phase:"",scenario:"",question:"Which combination of actions would help Amara build the STRONGEST credit score over time?",options:["Open many credit cards and max them all out","Pay every bill on time, keep utilization below 30%, and maintain accounts long-term","Only use cash and avoid all credit products","Pay bills late occasionally but always pay eventually"],correct:1,correctFeedback:"The three pillars of a strong score: (1) always pay on time (35% of score), (2) keep utilization low (30% of score), and (3) maintain long credit history (15% of score). These habits, practiced consistently, build an excellent FICO score over time.",incorrectFeedback:"A strong credit score requires: on-time payments every time (35%), low utilization below 30% (30%), and long-term account history (15%). Consistency in these three areas is the proven path to excellent credit."}
];

let currentQuestion=0,score=0,answered=false;
function renderQuestion(){const q=questions[currentQuestion];document.getElementById('progressFill').style.width=((currentQuestion)/questions.length*100)+'%';document.getElementById('progressText').textContent=`Question ${currentQuestion+1} of ${questions.length}`;const pl=document.getElementById('phaseLabel');if(q.phase){pl.textContent=q.phase;pl.classList.remove('hidden')}else{pl.classList.add('hidden')}const sb=document.getElementById('scenarioBox');if(q.scenario){document.getElementById('scenarioText').innerHTML=`<p style="color:#c8d6e8;margin:0;">${q.scenario}</p>`;sb.classList.remove('hidden')}else{sb.classList.add('hidden')}document.getElementById('questionCounter').textContent=`Question ${currentQuestion+1} of ${questions.length}`;document.getElementById('questionText').textContent=q.question;const grid=document.getElementById('optionsGrid');grid.innerHTML='';q.options.forEach((opt,i)=>{const btn=document.createElement('button');btn.className='option-btn';btn.textContent=opt;btn.onclick=()=>selectAnswer(i);grid.appendChild(btn)});document.getElementById('feedbackBox').style.display='none';document.getElementById('nextBtn').style.display='none';answered=false}
function selectAnswer(index){if(answered)return;answered=true;const q=questions[currentQuestion];const buttons=document.querySelectorAll('.option-btn');const isCorrect=index===q.correct;buttons.forEach((btn,i)=>{btn.classList.add('disabled');if(i===q.correct)btn.classList.add('correct');if(i===index&&!isCorrect)btn.classList.add('incorrect')});if(isCorrect)score++;const fb=document.getElementById('feedbackBox');fb.className='feedback '+(isCorrect?'correct':'incorrect');document.getElementById('feedbackTitle').textContent=isCorrect?'✅ Correct!':'❌ Not Quite';document.getElementById('feedbackText').textContent=isCorrect?q.correctFeedback:q.incorrectFeedback;fb.style.display='block';document.getElementById('nextBtn').style.display='inline-block';document.getElementById('nextBtn').textContent=currentQuestion<questions.length-1?'Next Question →':'See Results →'}
function nextQuestion(){currentQuestion++;if(currentQuestion>=questions.length){showResults()}else{renderQuestion();window.scrollTo({top:0,behavior:'smooth'})}}
function showResults(){document.getElementById('quizArea').style.display='none';document.querySelector('.progress-container').style.display='none';const pct=Math.round((score/questions.length)*100);let gradient,msg,detail;if(pct>=80){gradient='linear-gradient(135deg,#76C043,#4a8a20)';msg='Excellent Work!';detail=`You scored ${score}/${questions.length} (${pct}%). You have a strong understanding of credit cards, APR, and FICO scores. You're ready to use credit wisely!`}else if(pct>=60){gradient='linear-gradient(135deg,#C7922C,#a07520)';msg='Good Effort!';detail=`You scored ${score}/${questions.length} (${pct}%). Solid foundation! Review the APR calculations and credit score factors to strengthen your knowledge.`}else{gradient='linear-gradient(135deg,#e74c5a,#b83040)';msg='Keep Practicing!';detail=`You scored ${score}/${questions.length} (${pct}%). Revisit the Week 9 reading to strengthen your understanding of credit fundamentals, then try again.`}document.getElementById('resultsScreen').style.display='block';document.getElementById('scoreCircle').style.background=gradient;document.getElementById('scoreCircle').textContent=`${pct}%`;document.getElementById('scoreMsg').textContent=msg;document.getElementById('scoreDetail').textContent=detail;document.getElementById('progressFill').style.width='100%'}
function restartQuiz(){currentQuestion=0;score=0;document.getElementById('resultsScreen').style.display='none';document.getElementById('quizArea').style.display='block';document.querySelector('.progress-container').style.display='block';renderQuestion();window.scrollTo({top:0,behavior:'smooth'})}
renderQuestion();
</script>
</body>
</html>
